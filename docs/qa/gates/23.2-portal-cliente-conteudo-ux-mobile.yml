observations:
  - id: "DOC-001"
    severity: info
    category: code
    description: >
      Em documentos/page.tsx, o refator de metadados removeu a renderização de doc.filename
      (que antes aparecia truncado em linha secundária quando presente). O spec prescreveu a
      substituição completa do bloco, então o comportamento implementado está fiel, mas a
      informação 'filename' deixou de ser exibida no UI.
    recommendation: >
      Avaliar com PO se isso é desejável. Em casos onde dois documentos compartilham o mesmo
      'name' mas têm 'filename' distinto, o usuário perdeu o discriminador. Pode ser endereçado
      em uma próxima iteração se relevante (ex: exibir filename como 3ª linha quando difere de name).
  - id: "INFO-002"
    severity: info
    category: docs
    description: >
      Checkboxes da seção 'Acceptance Criteria' (- [ ]) permanecem desmarcados, embora os
      Task checkboxes estejam marcados.
    recommendation: "Cosmético — não bloqueia o gate."

