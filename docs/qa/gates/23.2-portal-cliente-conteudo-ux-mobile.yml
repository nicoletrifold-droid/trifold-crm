summary: >
  Refator de superfície (Tailwind + JSX estrutural + scrollbar-none em globals.css). Home
  sem cards duplicados (3º card agora exibe 'Status'); StatCard com text-lg font-bold truncate;
  hero usa ring-1 ring-inset em vez de border (sem conflito com border-l-4). Timeline com
  bg-stone-700; badges unificados entre fases/page.tsx e _components/fases-list.tsx (filled
  pattern); dot de check SVG branco sobre verde para fases concluídas. Galeria em grid-cols-2
  gap-2 mobile com aspect-square; filtros com overflow-x-auto scrollbar-none + flex-shrink-0
  nos pills. Documentos com metadados visíveis em todos breakpoints; botão download h-11.

