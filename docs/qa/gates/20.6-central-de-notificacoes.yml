  notes: >
    createAdminClient() usado exclusivamente server-side dentro de notifyClientes;
    access_token do WhatsApp nunca retornado ao browser.
    Vinculo check (cliente_obras) em GET e PATCH antes de qualquer operação de dados.
    Campos booleanos whitelisted — sem injeção possível via body.
    org_id obtido internamente da obra (não do request) — multi-org isolamento correto.

issues:
  - severity: medium
    category: code
    description: >
      Phone number não é pré-preenchido ao carregar a página de notificações.
      GET /api/cliente/obras/[obra_id]/notificacoes não retorna users.phone — apenas os campos
      de obra_notificacao_prefs. O cliente que habilitou WhatsApp e salvou o número verá
      o campo phone vazio ao revisitar a página.
    recommendation: >
      Melhoria futura: expandir GET para fazer JOIN em users e retornar phone junto com prefs,
      inicializando setPhone(data.phone ?? "") no useEffect. Não bloqueia MVP pois o número
      salvo é utilizado corretamente server-side — apenas a UX de "pré-preenchimento" está ausente.

  - severity: low
    category: code
    description: >
      prefKey usa cast `as keyof ObraNotificacaoPrefs` após lookup em EVENTO_PREF_KEY (Record<EventoNotificacao, string>).
      O cast mascara o tipo string — em teoria poderia resolver para campos não-boolean da interface.
    recommendation: >
      Tipar EVENTO_PREF_KEY como Record<EventoNotificacao, keyof ObraNotificacaoPrefs> e
      remover o cast explícito. Sem risco de runtime pois os valores são sempre campos
      notify_* corretos.

  - severity: low
    category: code
    description: >
      buildEmailHtml usa template literal com conteúdo de nome e obraName sem HTML escaping.
      XSS teórico se esses campos contiverem tags HTML.
    recommendation: >
      Aceitável em contexto de MVP: valores vêm de campos editados por admins (não usuários
      externos), e clientes de email modernos sanitizam HTML. Considerar escaping em iterações
      futuras se o escopo de quem edita obras expandir.

  - severity: low
    category: code
    description: >
      useEffect na página de notificações silencia erros de carregamento (.catch(() => {})).
      O usuário vê o estado default sem saber que as prefs reais falharam ao carregar.
    recommendation: >
      Adicionar setFeedback({ type: 'error', msg: 'Erro ao carregar preferências' }) no
      catch do useEffect para transparência. Impacto cosmético; defaults são razoáveis.
