  Approved for staging deploy via @devops. Post-deploy validation required:

  Within 24h of deploy, @qa to run baseline SQL queries (documented in story
  Dev Notes line 388-416) and confirm:
    1. cache_creation_input_tokens > 0 on first calls per agent_config
    2. cache_read_input_tokens > 0 on subsequent calls within 5min TTL
    3. avg_cache_hit_ratio >= 0.5 across CLAUDE_RESPONSE events
