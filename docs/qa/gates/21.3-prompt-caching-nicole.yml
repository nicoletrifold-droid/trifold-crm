# ----------------------------------------------------------------
# Issues by severity
# ----------------------------------------------------------------
top_issues:
  - id: 'PERF-001'
    severity: medium
    finding: |
      Historical ragContext duplication preserved (pipeline.ts:879-890 + 916-922).
      The original code appended ragContext twice — once formatted by
      buildPromptFromCode as "CONTEXTO DA BASE DE CONHECIMENTO", and once raw at
      the end. Dev intentionally preserved this for AC 7 (zero regression).
      Result: when ragContext is non-empty, those tokens are sent ~2x → extra
      input cost, partially offsetting cache savings.
    suggested_action: |
      Open follow-up tech-debt story to deduplicate ragContext after Story 21.3
      cache validation in production. Recommended: emit single dynamic block
      containing only the formatted version, drop the raw append. Would require
      its own regression suite to confirm Nicole behavior parity.
    blocks_release: false

  - id: 'TEST-001'
    severity: low
    finding: |
      No integration test mocks anthropic.messages.create to assert that
      `system` payload is actually an array with cache_control on block[0]
      (Dev Notes Testing section explicitly recommended this in story line 307).
      Unit tests verify buildSystemPrompt output, but the wire-level contract
      between pipeline and SDK is only covered by typecheck.
    suggested_action: |
      Add a minimal vi.fn() spy on anthropic.messages.create in a pipeline
      integration test asserting the call argument shape. Low priority because
      typecheck + production telemetry will catch deviations.
    blocks_release: false

  - id: 'MNT-001'
    severity: low
    finding: |
      The internal buildSystemPrompt() in pipeline.ts (line 873) shadows the
      same name imported as buildPromptFromCode from ../prompts. While the
      alias on import (line 31) avoids collision at the call site, the parallel
      function names increase cognitive load when grepping.
    suggested_action: |
      Consider renaming the pipeline internal function to e.g.
      `assembleSystemBlocks()` to make the layering explicit. Cosmetic.
    blocks_release: false

  - id: 'DOC-001'
    severity: low
    finding: |
      Pre-existing global lint failures (6 errors in @trifold/web/dashboard
      sistema/emails/*) flagged by Dev as not introduced by this story.
      Confirmed: errors are react-hooks/set-state-in-effect rule violations
      in unrelated files (Story 21.3 only touches packages/ai + scripts).
    suggested_action: |
      Track in separate tech-debt story for the web team. Non-blocking for 21.3.
    blocks_release: false

