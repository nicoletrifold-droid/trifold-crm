risk_assessment:
  probability: low
  impact: low
  rationale: >
    Mudança aditiva e isolada: emit enriquecido + 1 wrapper best-effort + 1 if-guard nos dois
    handlers onEvent. A notificação nunca derruba o pipeline (AC6, fire-and-forget após persistência
    do appointment), nunca toca is_ai_active (CON-1), e a roleta/notifyImobiliaria seguem intactos
    (context opcional). Boundary ai↔web limpo (sem import invertido). Pior caso runtime: notificação
    falha → log de erro e o agendamento + resposta da Nicole seguem normalmente. Sem migration, sem
    nova superfície de RLS/endpoint. Rollback trivial via git revert.

gate_decision:
  verdict: PASS
  rationale: >
    Os 7 quality checks passam. 8/8 ACs atendidos por código com evidência path:linha; 9/9 testes
    verdes nos caminhos testáveis (com/sem broker, falha não-propaga, context, fallbacks). O
    invariante crítico desta story — agendamento NOTIFICA o corretor sem desligar is_ai_active nem
    virar handoff — foi verificado diretamente no código (is_ai_active só no bloco handoff, fora do
    agendamento; handoff.ts:48-50). O boundary ai↔web foi resolvido com elegância via emit/onEvent
    (sem import invertido, sem endpoint/secret novo). type-check (ai+web) e ESLint exit 0. As issues
    remanescentes (1 MEDIUM de infra de teste herdada + 2 LOW) são não-bloqueantes. Aprovada para
    @devops push.
  next_steps:
    - "@devops *push da branch atual"
    - "Smoke pós-deploy: simular agendamento via Nicole em staging → corretor atribuído recebe push + email + WhatsApp UMA vez; Nicole continua respondendo ao lead (is_ai_active mantido); SELECT * FROM appointments confirma insert; sem entradas espúrias em follow_up_log/messages."
    - "@po manter backlog TEST-001 (vitest resolve.alias @web/*) — destrava testes de route/handler E corrige as 6 falhas do webhook 21.1."
    - "Avaliar REL-001 (dedup de notificação) caso futuramente haja retries de webhook ou troca de canal por lead."

