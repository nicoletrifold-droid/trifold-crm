# ----------------------------------------------------------------------------
# Top issues — actionable findings
# ----------------------------------------------------------------------------
top_issues:
  - id: REL-001
    severity: high
    category: reliability
    status: mitigated
    title: 'ON CONFLICT contra índice UNIQUE PARCIAL pode falhar inferência em Postgres'
    location: 'route.ts:704 (onConflict) × migrations/021_part2.sql:54-55 (UNIQUE INDEX FULL — pós v1.4)'
    finding: >-
      [HISTÓRICO] Versão original do part2.sql usava CREATE UNIQUE INDEX ... WHERE
      phone_normalized IS NOT NULL (partial), o que torna a inferência de ON CONFLICT
      do Postgres frágil — risco de fallback silencioso para INSERT direto e
      recriação do bug original.
    mitigation: >-
      v1.4 (2026-05-05): @dev removeu o WHERE clause do CREATE UNIQUE INDEX.
      Agora é UNIQUE FULL (não-parcial). ON CONFLICT (org_id, phone_normalized)
      no upsert do route.ts:704 infere o índice de forma 100% determinística.
      Comportamento NULL preservado: Postgres permite múltiplos NULLs em UNIQUE
      não-parcial por padrão (NULL != NULL em unique constraints), então phones
      inválidos (phone_normalized=NULL) não são bloqueados — sem regressão
      funcional. Comentários inline (line 57-64) e COMMENT ON INDEX (line 66-70)
      atualizados consistentemente. Verificado @qa em re-review pós-fix.
    suggested_action: 'COMPLETED — fix aplicado. Sem ação adicional.'
    blocking_for_devops: false
    risk_reduction: 'risco eliminado por design (índice UNIQUE FULL é determinístico)'

  - id: REL-002
    severity: medium
    category: reliability
    title: 'Race condition possível em findOrCreateConversation (sem UNIQUE constraint)'
    location: 'route.ts:767-838 (findOrCreateConversation)'
    finding: >-
      A tabela `conversations` não tem UNIQUE em (lead_id, status='active').
      Se 2 webhooks chegam quase-simultaneamente para o mesmo lead pela
      primeira vez, ambos podem retornar 0 rows no SELECT e ambos criarem
      conversation (status=active). A primeira mensagem cai numa, a segunda
      em outra → AC3 (histórico contínuo) parcialmente quebrado.
    suggested_action: >-
      Não é blocker para esta story (a story está focada em phone dedup), mas
      criar story follow-up (Epic 21 escopo) para adicionar UNIQUE PARTIAL
      INDEX ON conversations (lead_id) WHERE status = 'active' OU usar advisory
      lock no upsert. Documento como dívida técnica.
    blocking_for_devops: false
    risk_reduction: 'documentar como tech-debt para Story 21.x posterior'

  - id: REL-003
    severity: medium
    category: reliability
    title: 'after() pode ser killed pelo Vercel antes de terminar — outbound da Nicole pode não chegar'
    location: 'route.ts:391-626 (after() block)'
    finding: >-
      Vercel mata o lambda alguns segundos após o response. O `after()` do
      Next.js estende o lifetime, mas tem limite (em Hobby ~10s, em Pro
      configurável até maxDuration). maxDuration=60 está setado. Na prática,
      processMessage da Nicole + fetch outbound podem ultrapassar 60s em
      cenários de pipeline lento. Não há retry — falha silenciosa.
    suggested_action: >-
      Pós-deploy, monitorar logs `whatsapp_async_done` vs `WEBHOOK_ASYNC_ERROR`:
      se ratio >5% ou tempo p95 do `ms_async` >50s, considerar mover Nicole
      para um job queue (Inngest, Trigger.dev) em story futura. Para esta
      story, aceitável — era assim antes também.
    blocking_for_devops: false
    risk_reduction: 'monitorar pós-deploy'

  - id: TEST-001
    severity: medium
    category: tests
    title: 'Mock de Supabase não valida comportamento real do índice UNIQUE'
    location: 'packages/web/src/app/api/webhook/whatsapp/__tests__/route.test.ts:148-394'
    finding: >-
      Os 6 testes do webhook usam um mock in-memory que NÃO modela o
      comportamento de UNIQUE INDEX + ON CONFLICT do Postgres real. O teste
      AC8.4 (1 lead via 3 chamadas) passa porque o mock implementa upsert
      simulando o conflict, mas não há teste contra Postgres real (ou contra
      pglite/local). Se o REL-001 acima vier a falhar, não temos teste que
      pegue.
    suggested_action: >-
      Em story follow-up, adicionar teste de integração contra Postgres local
      (pgmem ou supabase local stack) para o cenário ON CONFLICT. Para esta
      story, smoke E2E pós-deploy (AC9) supre essa lacuna.
    blocking_for_devops: false
    risk_reduction: 'AC9 smoke E2E manual cobre o gap'

  - id: TEST-002
    severity: medium
    category: tests
    title: 'Falta teste do branch lead_upsert_conflict (race fallback)'
    location: 'route.ts:711-737'
    finding: >-
      O bloco `if (insertErr)` que faz re-query em caso de race do upsert não
      tem cobertura de teste. Se a UNIQUE constraint disparar e a re-query
      retornar null (improvável mas possível), o fluxo continua com lead=null
      e retorna 200 silencioso — perdemos a mensagem. Não é exercitado por
      nenhum teste.
    suggested_action: >-
      Adicionar teste em route.test.ts simulando insertErr forçado (mock que
      retorna error na primeira chamada) e verificando que (a) log
      lead_upsert_conflict é emitido e (b) re-query encontra o lead. Não-blocker.
    blocking_for_devops: false
    risk_reduction: 'baixo — branch raro'

  - id: REL-004
    severity: medium
    category: reliability
    title: 'DRY-RUN do cleanup conta msgs_migrated/conv_migrated mas APPLY pode divergir se grupos mudarem entre runs'
    location: 'scripts/cleanup-duplicate-leads.ts:354-405'
    finding: >-
      O DRY_RUN computa o que "seria" feito agora. Entre o dry-run e o
      --apply, novos leads podem chegar (webhook ainda ativo!). O apply então
      pode processar grupos diferentes. Isso é mitigado pelo audit log e por
      o cleanup ser idempotente (re-rodar não causa data loss), mas merece
      documentação no runbook.
    suggested_action: >-
      Runbook @devops: deploy migration 021_part1 → pause webhook traffic
      (ou aceitar que novos webhooks criarão leads "limpos" desde o início)
      → executar cleanup --apply → migration 021_part2. Idealmente parar
      webhook traffic durante cleanup minimiza divergência mas não é
      estritamente necessário (cleanup é idempotente).
    blocking_for_devops: false
    risk_reduction: 'documentar no runbook de deploy'

  - id: SEC-001
    severity: low
    category: security
    title: 'SECURITY DEFINER em normalize_phone_br aumenta superfície de ataque'
    location: 'migrations/021_part1.sql:30'
    finding: >-
      A função usa SECURITY DEFINER com search_path explicit (boa prática
      aplicada). Não há risco de SQL injection porque a função apenas usa
      regexp_replace sem dynamic SQL. Mas em geral SECURITY DEFINER deve ser
      o último recurso.
    suggested_action: >-
      Validar que de fato é necessário SECURITY DEFINER para a GENERATED
      COLUMN funcionar para todos os roles que fazem INSERT em leads. Se a
      RLS não bloquear, considerar SECURITY INVOKER. Não-blocker.
    blocking_for_devops: false
    risk_reduction: 'baixo — função é determinística e sem dynamic SQL'

  - id: PERF-001
    severity: low
    category: performance
    title: 'Build groups carrega TODOS os leads em memória'
    location: 'scripts/cleanup-duplicate-leads.ts:105-128'
    finding: >-
      `loadAllLeads` paginates com PAGE=1000 mas acumula tudo em memória.
      Para 100k leads, ~50MB+ heap. Para o estado atual de prod (verified
      11 grupos), trivial. Mas escala mal.
    suggested_action: >-
      Streaming ou processar groups em chunks. Não-blocker. Documentar como
      limite para o atual estado da DB.
    blocking_for_devops: false
    risk_reduction: 'aceitável para volume atual de prod'

  - id: MNT-001
    severity: low
    category: maintainability
    title: 'Marker `_brand_new` no objeto LeadResult é frágil'
    location: 'route.ts:641, 535, 753-755'
    finding: >-
      Anexar `_brand_new` ao objeto retornado por findOrUpsertLead acopla o
      contrato. Se outro código pegar esse objeto e serializar para JSON,
      _brand_new vaza. Aceitável aqui (objeto fica no escopo local), mas
      eu preferiria um tuple `[lead, isNew]` ou retornar { lead, isNew }.
    suggested_action: >-
      Refatorar em story de cleanup futura para retornar
      `{ lead, isBrandNew: boolean }`. Não-blocker.
    blocking_for_devops: false
    risk_reduction: 'baixo — escopo local'

  - id: DOC-001
    severity: low
    category: documentation
    title: 'Runbook de deploy não está formalizado'
    location: 'story file'
    finding: >-
      A sequência ordem-dependente é: (1) deploy code, (2) migration 021_part1,
      (3) cleanup script dry-run e revisão manual, (4) cleanup script --apply
      com I-UNDERSTAND-DELETE, (5) migration 021_part2 (que tem guard
      defensivo), (6) smoke E2E. Está implícita na story mas merece um
      runbook explícito em docs/runbooks/.
    suggested_action: >-
      @devops: criar docs/runbooks/21.1-deploy-runbook.md antes do deploy
      com checklist passo-a-passo + rollback. Não-blocker (defensive guard
      no part2.sql é a salvaguarda final).
    blocking_for_devops: false
    risk_reduction: 'guard defensivo no part2.sql cobre o pior caso'

