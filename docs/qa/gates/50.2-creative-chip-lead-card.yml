issues:
  - id: OBS-001
    severity: low
    category: accessibility
    description: >
      CreativePreviewModal não implementa focus trap — quando modal abre, foco
      pode escapar para conteúdo background via Tab. Uma reconheceu esta limitação
      no Design Spec ("manual por enquanto — aceito como CONCERN minor").
    recommendation: >
      Não-bloqueante. Para Story 50-4 ou refactor futuro, considerar instalar
      `react-focus-lock` (4kb gzip). Mitigação atual: Esc closes + backdrop click
      closes mantém escape route acessível.

  - id: OBS-002
    severity: low
    category: tooling
    description: >
      CodeRabbit CLI não executado nesta review — config aponta para WSL/Windows
      e host de revisão é macOS. Mesmo cenário da Story 50-1.
    recommendation: >
      Não-bloqueante. Análise manual cobriu code review, security, performance,
      regression e a11y. Recomendar @devops/CI executar CodeRabbit em ambiente
      WSL como passo opcional pós-push.

  - id: OBS-003
    severity: low
    category: testing
    description: >
      AC12 (3 test files unitários) DEFERRED. Projeto não tem framework de unit
      test configurado.
    recommendation: >
      Criar story de backlog "Setup Vitest + React Testing Library + jsdom" como
      enabler para coverage retroativo. Sugerir @po criar via *backlog-add
      type=tech_debt priority=medium.

  - id: OBS-004
    severity: low
    category: validation
    description: >
      AC14 (TTFB baseline antes/depois) DEFERRED — requer produção real.
    recommendation: >
      @devops captura p95 do `/dashboard/pipeline` via Vercel Analytics nos primeiros
      3-7 dias pós-deploy. Comparar com média da semana anterior. Threshold de
      regressão: >100ms adicional considera-se regressão e requer rollback ou
      otimização.

  - id: OBS-005
    severity: low
    category: security
    description: >
      Em creative-preview-modal.tsx:57, `deeplink` constrói URL via template
      literal: `/dashboard/campaigns/meta/${metaCampaignId}?ad_id=${adId}`. Não
      há encodeURIComponent. Os valores vêm do Meta API (não user input direto)
      então risco é mínimo, mas defense-in-depth seria melhor.
    recommendation: >
      Wrappar em `encodeURIComponent()`: `?ad_id=${encodeURIComponent(adId)}`.
      Mudança trivial mas não-bloqueante — pode ser melhoria opcional pré-push
      ou follow-up.

  - id: OBS-006
    severity: low
    category: performance
    description: >
      Cada `LeadCard` renderiza seu próprio `<CreativePreviewModal>` (atualmente
      retornando null quando !previewOpen). Em uma coluna com 50 cards Meta, isso
      é 50 componentes Modal stub em memória. Custo de render é mínimo (return
      null cedo), mas é footprint desperdiçado.
    recommendation: >
      Não-bloqueante. Otimização opcional futura: elevar o modal para nível
      KanbanBoard com state global `previewOpenForAdId`. Cards apenas
      disparam evento/callback. Reduz overhead em pipelines densos.

positive_findings:
  - id: POS-001
    description: >
      Design Spec da Uma seguido 1:1 — código CreativeChip e CreativePreviewModal
      são essencialmente copy-paste do spec, com comments referenciando o documento
      autoritativo. Zero divergência. Excelente coordenação inter-agente.

  - id: POS-002
    description: >
      Graceful degradation rigorosa em 3 níveis:
      1. fetch-creatives.ts: query error → console.warn + Map vazio
      2. CreativeChip: !thumbnailUrl || imgError → return null
      3. lead-card.tsx: !lead.creative || !thumbnailUrl → fallback SourceBadge
      Pipeline NUNCA quebra por causa do creative.

  - id: POS-003
    description: >
      Drag-and-drop conflict mitigation: stopPropagation no onClick + dedicated
      stopPropagation no onPointerDown garante que chip click NUNCA dispara drag
      do dnd-kit (PointerSensor com distance: 5 já é tolerante, mas o dev foi
      além).

  - id: POS-004
    description: >
      API load-more route.ts (linha 117) também enriquecida com creatives — leads
      paginados via "Carregar mais 50" preservam o chip. Consistência completa
      com carga inicial. Demonstra atenção a casos edge.

  - id: POS-005
    description: >
      Story 50-2 desbloqueia bug latente: leads `whatsapp_click_to_ad` que JÁ
      tinham `metadata.ad_id` populado pelo webhook Meta (cenários onde a coluna
      `leads.metadata` existe e o webhook gravou) passam a mostrar chip
      IMEDIATAMENTE após deploy — sem precisar esperar Story 50-3.

risk_assessment:
  probability: low
  impact: low_to_medium
  rationale: >
    Mudança substancial em volume (~470 LoC) mas com escopo bem isolado:
    apenas componentes do pipeline + helper + config. Múltiplos layers de
    graceful degradation reduzem impact. Rollback via git revert de 11 arquivos
    é simples. Pior cenário runtime: chip não aparece, mas SourceBadge fallback
    preserva UX original. Sem regressão funcional possível dado o design defensivo.

gate_decision:
  verdict: CONCERNS
  rationale: >
    Aprovada para push. CONCERNS verdict alinhado com convenção do projeto
    (gates 16.11, 50.1) para "aprovado com observações documentadas". Todas as
    6 issues são LOW severity e não-bloqueantes. Implementação cirúrgica e
    aderente ao Design Spec. Maior valor agregado da review: identificou
    side-effect positivo (POS-005) e oportunidades de melhoria não-críticas.
  next_steps:
    - "@devops *push da branch atual (Story 50-1 + 50-2 juntas)"
    - "Pós-deploy: @devops valida AC5 da 50-1 (≥80% thumbnail populated) E AC14 da 50-2 (TTFB sem regressão)"
    - "Considerar OBS-005 (encodeURIComponent) como quick fix pré-push (1 linha)"
    - "Criar story de backlog para OBS-003 (Setup Vitest + RTL)"

complementary_work:
  - storyId: "50.1"
    relationship: "Prerequisite"
    note: >
      Story 50-2 depende de 50-1 em produção para exibir chips. Deploy
      conjunto recomendado (mesma branch / PR).
  - storyId: "50.3"
    relationship: "Complementar"
    note: >
      Story 50-3 (CTWA ad attribution) habilitará chip também para leads
      Click-to-WhatsApp NOVOS após seu deploy. 50-2 já funciona para leads
      Meta Lead Form (via webhook Meta) e CTWA legados (que tinham metadata.ad_id).

