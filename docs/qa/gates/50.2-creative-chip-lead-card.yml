storyId: "50.2"
title: "Componente CreativeChip no Lead Card do Pipeline"
epic: 50
verdict: CONCERNS
reviewedAt: "2026-06-03"
reviewer: "Quinn (@qa)"
iteration: 1

summary: >
  Implementação substancial (+136/-15 modificados + 347 LoC novos em 4 arquivos)
  seguindo 1:1 o Design Spec da Uma (Variante A — Inline Replace). Type-check + lint
  clean (verificados independentemente). Degradação graciosa robusta — pipeline NUNCA
  quebra por falha de creative. Drag-and-drop conflict-free via stopPropagation duplo.
  AC1-AC11 + AC13 atendidos por código. AC12 (unit tests) e AC14 (TTFB baseline)
  environmentally deferred. Aprovada para @devops push junto com Story 50-1,
  com 6 observações documentadas (todas LOW severity).

quality_checks:
  - check: "1. Code Review"
    status: PASS
    note: >
      Código segue Design Spec da Uma 1:1. JSDoc em todos os 4 arquivos novos.
      Naming consistente (CreativeChip ao lado de SourceBadge; CreativeData ao lado
      de tipos compartilhados). Imports organizados. Comentários referenciam Story 50-2
      e Design Spec autoritativo. `eslint-disable-next-line @next/next/no-img-element`
      apropriadamente justificado (Meta CDN tokens transitórios incompatíveis com next/image).

  - check: "2. Unit Tests"
    status: CONCERNS
    note: >
      AC12 (3 test files) DEFERRED. Projeto não tem framework de unit test instalado
      (sem vitest, jest, @testing-library/react). Apenas Playwright E2E configurado
      com suite mínima (1 smoke test). Stories 47-1 e 46-1 deployaram em produção
      sem unit tests — alinhado com pattern do projeto. Recomendação: criar story
      de backlog "Setup unit test infra (Vitest + RTL)" como follow-up.

  - check: "3. Acceptance Criteria"
    status: PASS
    note: >
      12/14 ACs atendidos por código (AC1-AC11, AC13). 2 ACs environmentally deferred
      (AC12 testes — ver check 2; AC14 TTFB baseline — requer produção).
      AC traceability completa — ver ac_traceability abaixo.

  - check: "4. No Regressions"
    status: PASS
    note: >
      - LeadCard mantém retrocompatibilidade: prop `creative` é opcional, fallback
        para SourceBadge + utm_campaign quando `creative === null` (cenário comum).
      - DragOverlay (kanban-board.tsx:436) renderiza LeadCard clone usando `activeLead`
        do stageMap — `creative` é preservado naturalmente via state. Chip aparece
        durante drag também.
      - Optimistic update no DnD (kanban-board.tsx:225) preserva creative via spread
        de movedLead.
      - API load-more `/api/pipeline/leads` atualizada paralelamente — consistência
        com carga inicial. Leads paginados também ganham chip.
      - SourceBadge fallback preservado intacto para leads não-Meta (website, walk_in, etc).

  - check: "5. Performance"
    status: PASS
    note: >
      AC7 (batched lookup) implementado corretamente em fetch-creatives.ts:
      - 1 query Supabase para a página inteira (até 50 leads × N stages)
      - .in("meta_ad_id", adIds) onde adIds = Set distinct de metadata.ad_id
      - Embed adsets→campaigns resolve campaign_name no mesmo round-trip
      - PostgREST handles bem `.in(...)` com até centenas de IDs
      Loading="lazy" no <img> garante que thumbs só carregam ao entrar no viewport.
      Modal só renderiza img quando `open=true`. Sem renderização desperdiçada.

  - check: "6. Security"
    status: PASS
    note: >
      - URLs de creative.thumbnail_url e creative.image_url vêm do Meta CDN (público).
      - Sem PII em nenhum dos novos arquivos.
      - RLS de meta_ads respeitada (query usa client com sessão do usuário em page.tsx;
        API route usa requireAuth + appUser.org_id como filtro).
      - Sem SQL injection (Supabase typed client + .in/.eq).
      - XSS: nenhum innerHTML; React escapa por default no JSX.
      - `as string` cast em creative.thumbnail_url tolerado — fallback via onError se
        valor não-string em runtime (defensive). Ver OBS-005 para defense-in-depth.

  - check: "7. Documentation"
    story_status: PASS
    note: >
      Comentários inline referenciam Epic/Story. JSDoc comprehensive em todos os 4
      arquivos novos explicando comportamento, contracts e graceful degradation.
      Design Spec da Uma (docs/assets/design-specs/50-2-creative-chip-design-spec.md)
      é autoritativo e detalhado. Completion Notes do @dev documentam decisões e
      justificativas.

