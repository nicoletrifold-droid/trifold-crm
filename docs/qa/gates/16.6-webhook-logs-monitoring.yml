summary: |
  Story 16.6 aprovada após ciclo de review + fix. Todos os 5 ACs implementados e verificados.
  Issues C-001 e C-002 identificados na primeira review e corrigidos pelo @dev:
  - C-001: insert síncrono movido para antes de todos os early returns
  - C-002: admin endpoint usa createAdminClient() sem filtro de org_id
