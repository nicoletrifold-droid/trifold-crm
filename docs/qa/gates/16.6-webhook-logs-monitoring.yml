ac_checklist:
  - ac: AC1
    status: PASS
    notes: |
      Insert síncrono ocorre antes de todos os early returns do POST handler.
      Assinatura inválida: loga com signature_valid=false + processing_error="invalid_signature", retorna 403.
      Sem leadgen_id (ping): loga com event_type="ping" + processed=true, retorna 200.
      JSON parse inválido: impossível logar sem body — único early return aceitável antes do insert.
      Happy path (leadgen): insert → after() → processLeadAsync → processed=true/processing_error.
  - ac: AC2
    status: PASS
    notes: |
      createAdminClient() substituiu createClient() — sem filtro de org_id.
      Todos os webhook_logs visíveis incluindo org_id IS NULL (pending events).
      Auth admin mantida via getServerUser() + role check.
      source filter, limit (max 200), offset, created_at DESC — todos corretos.
      Retorna { data, total }.
  - ac: AC3
    status: PASS
    notes: |
      UI completa: badges corretos (verde=processed, vermelho=error, cinza=pending),
      filtro por source, auto-refresh 30s, expandable rows com leadgen_id + error detail.
      Trata 403 de admin graciosamente. Padrão visual consistente com /dashboard/sistema.
  - ac: AC4
    status: PASS
    notes: |
      isBusinessHoursBRT() correto (UTC 11–23 = BRT 08–20). Threshold 30min.
      PGRST116 tratado (no rows = estado válido, não erro). Alerta Telegram com mensagem PT-BR.
      Graceful degradation se TELEGRAM_ADMIN_CHAT_ID ausente (console.warn, sem throw).
      CRON_SECRET protection. Retorna 200 sempre. vercel.json: */30 * * * *.
  - ac: AC5
    status: PASS
    notes: "npm run type-check: 8/8 ✅. npm run lint: 0 erros ✅."

issues:
  - id: C-001
    severity: medium
    status: FIXED
    category: requirements
    ac: AC1
    fix_description: |
      Insert síncrono movido para antes dos early returns.
      Assinatura inválida → processing_error="invalid_signature" + retorna 403.
      Ping (sem leadgen_id) → processed=true + retorna 200.

  - id: C-002
    severity: medium
    status: FIXED
    category: requirements
    ac: AC2
    fix_description: |
      createAdminClient() substituiu createClient(). Filtro .eq("org_id") removido.
      Todos os eventos visíveis incluindo pending (org_id NULL).

  - id: C-003
    severity: low
    status: DEBT
    category: requirements
    ac: AC2
    description: |
      getServerUser() retorna redirect 302 ao invés de 401 para unauthenticated requests.
      Padrão existente no projeto — afeta apenas clientes API programáticos, não a UI.
    recommendation: "Criar helper de auth que retorna 401 para rotas API puras — candidato a story de tech debt."
    blocking: false

