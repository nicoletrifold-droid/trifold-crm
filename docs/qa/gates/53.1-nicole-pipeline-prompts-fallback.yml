notes: |
  Verificação independente executada (não confiei só no relatório do @dev):
  - pnpm vitest run packages/ai/src → 252/252 passam (14 arquivos)
  - pnpm --filter @trifold/ai type-check → 0 erros (exit 0)

  Segurança (foco da review): o tipo DbPromptOverrides expõe APENAS os 5 slugs
  editáveis. IDIOMA, ENDEREÇO DA SEDE e LEMBRETE FINAL são literais hard-coded em
  buildStaticSystemContent e NÃO são indexados por chave de override — portanto um
  row malicioso em agent_prompts com slug="lembrete-final"/"idioma" é armazenado em
  prompt_overrides mas NUNCA lido, não conseguindo desativar guardrails de segurança.
  O LEMBRETE FINAL é reafirmado por último (last-instruction-wins), mitigando injeção
  via override de personality/guardrails. Read path org-scoped (.eq("org_id", orgId)).

  Reliability: banco vazio → prompt_overrides {} → comportamento idêntico ao legado.
  Falha na query de agent_prompts → promptRows null → {} → fallback hard-coded
  (degradação graciosa). Única mudança intencional: off-hours passa a usar
  OFF_HOURS_PROMPT (AC8).
