top_issues:
  - id: 'REL-001'
    severity: low
    finding: 'OFF_HOURS_PROMPT (novo fallback de off-hours) contém emojis (😊 📅 💛), contrariando a regra "ZERO emojis" do LEMBRETE FINAL. É intencional pelo AC8 (mensagem canned, não output do LLM), mas representa mudança visível de comportamento em produção: a auto-resposta fora de horário passa a ter emojis.'
    suggested_action: 'Confirmar com produto que a auto-resposta de off-hours com emojis é desejada. Sem ação de código necessária.'
  - id: 'SEC-001'
    severity: low
    finding: 'Conteúdo de override (agent_prompts.content) é concatenado no system prompt sem sanitização nem limite de tamanho. A autorização de quem pode escrever em agent_prompts está fora do escopo (Story 53-2).'
    suggested_action: 'Garantir authz + validação de tamanho no write-side da Story 53-2. O piso de segurança (LEMBRETE FINAL reafirmado por último) já mitiga prompt-injection neste read path.'
  - id: 'TEST-001'
    severity: low
    finding: 'Edge case de slug inexistente em agent_prompts e override de conteúdo gigante não têm teste unitário (foram analisados como seguros: slug desconhecido nunca é lido por buildStaticSystemContent; conteúdo gigante apenas consome tokens).'
    suggested_action: 'Opcional: adicionar teste assertando que um slug fora dos 5 conhecidos não altera o prompt.'
  - id: 'PERF-001'
    severity: low
    finding: 'Segunda query (agent_prompts) é sequencial à query de agent_config em loadAgentConfig; ambas usam apenas orgId e poderiam ser paralelizadas.'
    suggested_action: 'Opcional: Promise.all das duas queries quando agent_config tem dado (micro-otimização).'

