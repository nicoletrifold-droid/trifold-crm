security_assessment:
  put_field_scope: 'PASS — .update({content}) altera APENAS content. slug vem da URL (filtro), org_id da sessão (filtro). Impossível alterar slug/type/is_active/org_id via body.'
  org_scoping: 'PASS — GET e PUT filtram .eq("org_id", appUser.org_id) derivado da sessão autenticada, nunca do input. Impossível editar prompt de outra org.'
  role_enforcement: 'PASS — requireRole(appUser,["admin"]) em GET list, GET [slug] e PUT. Supervisor recebe 403 antes de tocar o banco.'
  reliability_input: 'PASS — JSON malformado → 400 (try/catch); content vazio/curto → 400; erro de DB → 500.'

top_issues:
  - id: 'REG-001'
    severity: medium
    finding: 'Migration 096 aplica admin-only a TODA a tabela agent_config via FOR ALL USING. Mas agent_config também guarda business_hours, editado pela página /dashboard/configuracoes/horario cujo guard é canAccess("configuracoes.horario"), NÃO role==admin. Em orgs com role_permissions customizado (Epic 35) que concedam configuracoes.horario a não-admin, aplicar 096 quebraria silenciosamente o salvamento de horário (a Server Action de horario não checa o erro de .update(), então a RLS rejeitaria sem feedback ao usuário).'
    suggested_action: 'ANTES de aplicar 096 em prod: consultar role_permissions de produção para confirmar que nenhum role não-admin tem configuracoes/configuracoes.horario concedido. No default hardcoded supervisor tem configuracoes:false (seguro). Se algum role customizado tiver, ou (a) restringir a migration a alvos mais granulares (apenas agent_prompts + endurecer agent_config apenas para os campos de prompt/mensagens), ou (b) elevar o guard da página horario para role==admin, ou (c) aceitar explicitamente que horário comercial passa a ser admin-only.'
  - id: 'SEC-002'
    severity: low
    finding: 'Estado intermediário: migration 096 NÃO aplicada em prod, então a RLS do banco ainda permite supervisor escrever em agent_config/agent_prompts. A guarda efetiva hoje é a checagem app-layer (requireRole nas rotas + role check nas Server Actions de 53-3). Defense-in-depth incompleta até aplicar 096.'
    suggested_action: 'Aceitável como estado intermediário pois nenhum caminho de app expõe write a não-admin. Aplicar 096 (após REG-001) para completar a camada de banco.'

