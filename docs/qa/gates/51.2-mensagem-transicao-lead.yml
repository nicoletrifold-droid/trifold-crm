  - check: "Story unit tests (diretório broker)"
    command: "npx vitest run packages/web/src/lib/broker/"
    result: "2 files, 20/20 passed (124ms) — 15 novos (transition-message) + 5 herdados (dispatch-broker-message) intactos."
  - check: "ESLint (3 arquivos da story)"
    command: "pnpm --filter @trifold/web exec eslint <transition-message.ts, transition-message.test.ts, send-message/route.ts>"
    result: "exit 0, zero hits."
  - check: "Type-check web"
    command: "pnpm --filter @trifold/web type-check"
    result: "Zero erros em transition-message.ts e send-message/route.ts. Erros remanescentes apenas em .next/{dev/}types/validator.ts (módulos dashboard/corretores/*.js stale) — ruído ambiental Next, não código da story."
  - check: "Full regression suite"
    command: "npx vitest run"
    result: "301 passed / 6 failed. As 6 falhas são EXCLUSIVAS de webhook/whatsapp/route.test.ts (Story 21.1, alias @web/* pré-existente — gate 50.3 TEST-001). Zero falhas em arquivos desta story."
  - check: "is_ai_active não escrito no send path"
    command: "grep -rn is_ai_active packages/web/src/lib/broker/ <send-message/route.ts>"
    result: "Única ocorrência é o comentário 'NÃO desliga is_ai_active' (route.ts:26) — confirmado intocado."
  - check: "Ordem transição (role='assistant') antes da mensagem do corretor (role='broker')"
    command: "leitura de route.ts"
    result: "Check existingBrokerMsg (149-155) antes de inserts; transição role='assistant' (180-193); mensagem do corretor role='broker' (248-255) depois. Idempotência confirmada."

risk_assessment:
  probability: low
  impact: low
  rationale: >
    Mudança aditiva e isolada (1 helper puro + 1 bloco try/catch na route). A transição
    nunca derruba a request (AC4), nunca se repete (role='assistant'), e não altera
    is_ai_active. Reusa a infra validada da 51-1 (dispatchBrokerMessage, auth, ownership).
    Pior caso runtime: envio da transição falha → registrada com metadata.send_error e a
    mensagem do corretor segue normalmente. Sem migration, sem nova superfície de RLS.
    Rollback trivial via git revert.

gate_decision:
  verdict: PASS
  rationale: >
    Os 7 quality checks passam. 6/6 ACs atendidos por código com evidência path:linha;
    15/15 testes verdes nos caminhos testáveis (texto, fallback, idempotência); lint exit 0
    e type-check sem erros nos arquivos da story (resíduos ambientais/pré-existentes). O
    invariante crítico desta story — a transição grava role='assistant', logo é idempotente
    (nunca se repete) e não dispara o takeover sozinha — foi verificado diretamente no código,
    assim como a preservação de is_ai_active e o isolamento de falhas (AC4). As issues
    remanescentes (1 MEDIUM de infra de teste herdada + 3 LOW) são não-bloqueantes. Aprovada
    para @devops push.
  next_steps:
    - "@devops *push da branch atual"
    - "Smoke pós-deploy: corretor envia 1ª mensagem → lead recebe (1) transição + (2) mensagem do corretor; 2ª mensagem → APENAS a mensagem do corretor. SELECT role, content, metadata FROM messages WHERE conversation_id=X ORDER BY created_at — confirmar role='assistant'+is_transition aparece UMA vez."
    - "@po manter backlog TEST-001 (vitest resolve.alias @web/*) — destrava testes de route da 51-2 e corrige as 6 falhas do webhook 21.1."
    - "Tratar REL-002 (filtro status='active') na story que implementar o estado handed_off da conversation."

