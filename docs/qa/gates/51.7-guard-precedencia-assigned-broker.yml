risk_assessment:
  probability: low
  impact: low
  rationale: >
    Mudança aditiva e isolada: 2 helpers puros + 1 campo no select existente + guards em B1/B2
    + auditoria best-effort + coalescência de destinatário nos handlers. O guard só PODE deixar
    de atribuir (nunca atribui errado), e usa optional chaining defensivo. Pior caso runtime:
    auditoria broker_assignment_skipped falha → console.error e pipeline segue. Sem migration,
    sem nova superfície de RLS/endpoint, sem alteração de is_ai_active. Corrige um bug P0 (perda
    silenciosa de visibilidade do corretor) com superfície de risco mínima. Rollback trivial.

gate_decision:
  verdict: PASS
  rationale: >
    Os 7 quality checks passam. 8/8 ACs atendidos por código com evidência path:linha; 34/34
    testes verdes (22 novos cobrindo os 5 cenários obrigatórios + edges, 12 do pipeline
    intactos). O invariante P0 — o pipeline da Nicole NUNCA sobrescreve um assigned_broker_id
    já definido — foi verificado diretamente: shouldAssignPipelineBroker exige !currentOwnerId,
    aplicado em B1 (pipeline.ts:662) e B2 (728). A separação dono/especialista está correta
    (appointments.broker_id e broker_user_id seguem o corretor do imóvel; a notificação vai ao
    dono quando o guard bloqueia). is_ai_active intocado; notify-appointment.ts inalterado;
    call-sites humanos C1-C4 não tocados. type-check (ai+web) e ESLint (web) exit 0. As issues
    remanescentes (1 MEDIUM de infra de teste herdada + 2 LOW) são não-bloqueantes. Aprovada
    para @devops push.
  next_steps:
    - "@devops *push da branch atual"
    - "Smoke pós-deploy: criar lead via WhatsApp → roleta atribui Corretor A; simular agendamento Nicole (imóvel primário = Corretor B) → assigned_broker_id PERMANECE A; appointments.broker_id = B; Corretor A recebe a notificação (não B); Corretor A ainda enxerga o lead (RLS 085); SELECT broker_assignment_skipped confirma auditoria."
    - "Smoke cenário Telegram: lead sem roleta (NULL) → pipeline agenda → assigned_broker_id preenchido pelo pipeline (guard não bloqueou)."
    - "@po manter backlog TEST-001 (vitest resolve.alias @web/*) e considerar MNT-001 (.single()→.maybeSingle() em pipeline.ts:564) + versionar RLS 085 (follow-up @data-engineer)."

