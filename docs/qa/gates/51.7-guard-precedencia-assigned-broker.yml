schema: 1
storyId: "51.7"
story: "51.7"
title: "Guard de Precedência em assigned_broker_id (ADR-001, Opção 3)"
epic: 51
gate: PASS
verdict: PASS
status_reason: >
  Os 8 ACs estão atendidos por código com evidência path:linha e cobertos por 34
  testes verdes (22 novos do guard + 12 do pipeline pré-existente). O invariante
  P0 da story — o pipeline da Nicole nunca sobrescreve um assigned_broker_id já
  definido (roleta/humano) — foi verificado diretamente no código: B1 (pipeline.ts:662)
  e B2 (pipeline.ts:728) só setam leadPatch.assigned_broker_id quando
  shouldAssignPipelineBroker retorna true, e o helper exige !currentOwnerId. A
  separação dono/especialista é preservada: appointments.broker_id e broker_user_id
  no emit continuam usando o corretor do IMÓVEL (pipeline.ts:645,701), enquanto a
  notificação (notification_broker_user_id) vai ao dono atual quando o guard bloqueia.
  is_ai_active NÃO é tocado por esta story (confirmado por git diff). A auditoria
  broker_assignment_skipped é best-effort (try/catch). type-check (ai+web) e ESLint
  (web routes) exit 0; as 6 falhas pré-existentes do webhook 21.1 (alias @web/* no
  vitest) permanecem inalteradas.
reviewer: "Quinn (@qa)"
reviewedAt: "2026-06-09"
updated: "2026-06-09T16:15:00Z"
iteration: 1
quality_score: 100
waiver: { active: false }

quality_checks:
  - check: "1. Requirements Traceability"
    status: PASS
    note: >
      AC1-AC8 mapeados para código e teste. AC1 (assigned_broker_id no select de
      currentLead, pipeline.ts:562, tipado string|null pela inferência do client).
      AC2/AC3 (guards B1/B2 via shouldAssignPipelineBroker, pipeline.ts:662 e 728).
      AC4 (lead NULL → atribui, helper retorna true — teste pipeline-broker-guard.test.ts:24).
      AC5 (resolveNotificationBrokerUserId, pipeline.ts:700 + ambos handlers webhook
      481-486/588-592). AC6 (call-sites humanos C1-C4 não tocados — confirmado por
      diff). AC7 (auditoria broker_assignment_skipped em B1/B2, try/catch). AC8
      (type-check+lint+34 testes). Ver tabela ac_traceability.

  - check: "2. Code Quality & Standards"
    status: PASS
    note: >
      Excelente extração de helpers puros (shouldAssignPipelineBroker,
      resolveNotificationBrokerUserId) logo após hasConfirmedDay, seguindo fielmente
      o padrão de lógica pura testável co-localizada do projeto. DRY: B1 e B2
      compartilham os mesmos helpers, garantindo comportamento idêntico. JSDoc
      abrangente documentando a decisão do ADR-001 e a separação dono/especialista.
      Imports absolutos (@web/*) nos dois handlers web. Boundary ai↔web respeitado:
      pipeline.ts apenas enriquece o metadata do evento com notification_broker_user_id;
      nenhum import invertido. Sem código morto. Diff mínimo e cirúrgico nos webhooks
      (de "if (type && broker_user_id)" para "if (type) { resolve + if (recipient) }").

  - check: "3. Security / Correctness"
    status: PASS
    note: >
      O guard de fato impede a sobrescrita. shouldAssignPipelineBroker(propertyBrokerId,
      currentOwnerId) = Boolean(propertyBrokerId) && !currentOwnerId (pipeline.ts:74):
      retorna false sempre que currentOwnerId é truthy, portanto leadPatch.assigned_broker_id
      NUNCA é setado quando o lead já tem dono — em B1 (pipeline.ts:662) e B2 (728).
      Separação dono/especialista intacta: appointments.broker_id = assignedBrokerId do
      imóvel (pipeline.ts:645) e o emit mantém broker_user_id = assignedBrokerId (701) para
      contexto/observabilidade. O consumidor crítico send-message/route.ts:86
      (lead.assigned_broker_id !== appUser.id) é protegido por design: o pipeline deixa de
      mover o valor sob os pés desse check. RLS 085 (corretor vê só leads próprios) preservada.

  - check: "4. Reliability / Error Handling"
    status: PASS
    note: >
      AC7 honrado: a auditoria broker_assignment_skipped está envolvida em try/catch com
      console.error no catch em B1 (pipeline.ts:666-681) e B2 (731-746) — best-effort, nunca
      derruba o pipeline. Resolução do destinatário backward-compatible: os handlers usam
      notification_broker_user_id ?? broker_user_id (whatsapp 589-591 / telegram 483-485);
      eventos antigos sem notification_broker_user_id caem para broker_user_id (comportamento
      51-3). O dispatch continua fire-and-forget (void ... .catch). currentLead reflete o
      estado persistido ANTES do UPDATE único (leadPatch aplicado depois dos blocos), que é o
      comportamento correto para o guard.

  - check: "5. Test Architecture"
    status: PASS
    note: >
      22 testes no novo pipeline-broker-guard.test.ts cobrindo todos os 5 cenários
      obrigatórios do T6: Cenário 1 (NULL → atribui, true), Cenário 2 (lead com dono →
      bloqueia, false, mesmo broker e broker diferente), Cenário 3 (notify = dono quando
      bloqueia), Cenário 4 (notify = imóvel quando NULL), Cenário 5 (B1/B2 compartilham
      helpers → comportamento idêntico). Edges adicionais cobertos: propertyBroker null,
      string vazia (falsy), owner undefined. A decisão de testar os helpers puros (em vez de
      mockar processMessage inteiro com Supabase/Anthropic) é pragmática e determinística, e
      mantém B1/B2 idênticos por construção. Gap não-bloqueante (TEST-001): os call-sites
      onEvent dos webhooks (resolução notification_broker_user_id ?? broker_user_id) não têm
      teste de integração — mesma causa raiz do alias @web/* não resolvido no vitest
      (herdado de 50-3/51-1/51-2/51-3). Risco baixo: lógica trivial de coalescência.

  - check: "6. NFR (Performance)"
    status: PASS
    note: >
      Zero query extra para o guard: assigned_broker_id foi adicionado ao select de currentLead
      JÁ existente (pipeline.ts:562) — sem novo round-trip. A auditoria
      broker_assignment_skipped só insere quando o guard bloqueia ativamente (lead já tem dono
      E pipeline achou primário), caso de exceção, não no caminho comum. Sem regressão de
      comportamento quando lead é NULL: shouldAssignPipelineBroker retorna true, atribuição
      ocorre como antes. Mudança puramente aditiva em termos de carga.

  - check: "7. Regression Risk"
    status: PASS
    note: >
      Mudança aditiva e isolada. Pipeline e webhooks continuam funcionando: type-check ai+web
      0 erros, 34/34 testes do pipeline verdes (12 existentes + 22 novos). A 51-3 (notificação
      no agendamento) continua disparando — o handler agora resolve o destinatário em vez de
      gatear no broker_user_id, mantendo backward-compat para eventos sem o novo campo. As 6
      falhas pré-existentes de alias @web/* (webhook/whatsapp/__tests__/route.test.ts, Story
      21.1) permanecem idênticas com/sem esta story (62 passed / 6 failed na suite web full).
      is_ai_active NÃO está no diff de pipeline.ts (grep + git diff confirmam). notify-appointment.ts
      NÃO foi alterado (confirmado: ausente do git diff). Rollback trivial; sem migration.

