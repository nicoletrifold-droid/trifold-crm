    status: Met
    note: "pipeline.ts:562 — .select('stage_id, property_interest_id, assigned_broker_id'). Sem query adicional; tipo string|null inferido pelo client. Acesso via currentLead?.assigned_broker_id em B1/B2."
  - ac: "AC2"
    status: Met
    note: "Guard B1 — pipeline.ts:662: if (shouldAssignPipelineBroker(assignedBrokerId, currentLead?.assigned_broker_id)) leadPatch.assigned_broker_id = assignedBrokerId. appointments.broker_id (645) e emit broker_user_id (701) inalterados (corretor do imóvel). Teste pipeline-broker-guard.test.ts:33-39."
  - ac: "AC3"
    status: Met
    note: "Guard B2 (handoff) — pipeline.ts:728: mesmo helper, só atribui se !currentOwnerId. Teste compartilhado (Cenário 5) pipeline-broker-guard.test.ts:79-97 confirma comportamento idêntico ao B1."
  - ac: "AC4"
    status: Met
    note: "shouldAssignPipelineBroker('user-B', null) === true (pipeline.ts:74). Cenário Telegram NULL preservado. Teste pipeline-broker-guard.test.ts:24-30."
  - ac: "AC5"
    status: Met
    note: "resolveNotificationBrokerUserId = currentOwnerId ?? propertyBrokerId ?? null (pipeline.ts:89). Emitido como notification_broker_user_id (pipeline.ts:700-701). Ambos handlers: notification_broker_user_id ?? broker_user_id (whatsapp:589-591, telegram:483-485). Testes pipeline-broker-guard.test.ts:55-77."
  - ac: "AC6"
    status: Met
    note: "git diff HEAD não inclui assign/route.ts, handoff/route.ts, bulk/route.ts nem leads/route.ts. Call-sites humanos C1-C4 intocados; atribuições humanas continuam sobrescrevendo por design."
  - ac: "AC7"
    status: Met
    note: "Auditoria broker_assignment_skipped implementada (não waived) em B1 (pipeline.ts:666-681, trigger pipeline_b1) e B2 (731-746, trigger pipeline_b2), no branch else-if (propertyBroker && currentOwner). try/catch + console.error — best-effort. metadata = { existing_broker_id, attempted_broker_id, trigger }."
  - ac: "AC8"
    status: Met
    note: "pnpm --filter @trifold/ai type-check → 0 erros. pnpm --filter @trifold/web type-check → 0 erros. ESLint web routes → exit 0. npx vitest run packages/ai → 241 passed; suite do pipeline 34/34 (22 guard + 12 existentes)."

issues:
  - id: TEST-001
    severity: medium
    category: testing
    finding: >
      A resolução do destinatário nos call-sites onEvent dos webhooks
      (notification_broker_user_id ?? broker_user_id) não tem cobertura de teste de
      integração — apenas o helper resolveNotificationBrokerUserId (que produz o valor
      emitido) é testado unitariamente. Mesma causa raiz herdada: o alias @web/* não
      resolve no vitest root (impede testar routes que importam @web/lib/supabase/admin).
      Gate 50.3/51.1/51.2/51.3 já rastreiam.
    suggested_action: >
      Não-bloqueante (a lógica do call-site é coalescência trivial e o helper é testado).
      Resolver via story de QA infra (resolve.alias @web/* → packages/web/src/* no
      vitest.config.ts OU vitest workspaces), que destrava os testes de route E corrige as
      6 falhas pré-existentes do webhook 21.1. Validar o destinatário por smoke pós-deploy.
  - id: MNT-001
    severity: low
    category: maintainability
    finding: >
      O fetch de currentLead em pipeline.ts:564 usa .single() (lança em 0 rows), enquanto
      a convenção do projeto prefere .maybeSingle(). É comportamento PRÉ-EXISTENTE, fora do
      escopo desta story (o @dev corretamente não o alterou). Não é risco desta story: o
      guard usa optional chaining (currentLead?.assigned_broker_id), então mesmo que o fetch
      retornasse null, o guard degradaria para "lead sem dono" (permite atribuição) — não há
      sobrescrita indevida. O .single() só lançaria se o lead não existisse, cenário que já
      seria erro upstream.
    suggested_action: >
      Não-bloqueante. Considerar trocar .single() → .maybeSingle() em pipeline.ts:564 numa
      story de hardening futura, alinhando à convenção do projeto.
  - id: OBS-001
    severity: low
    category: tooling
    finding: >
      CodeRabbit CLI não executado (config WSL; host de review é macOS/darwin). Mesmo
      cenário das stories 50-x e 51-x.
    suggested_action: >
      Não-bloqueante. Análise manual cobriu traceability, code quality, security/correção,
      reliability, NFR, test architecture e regressão. CI pode rodar CodeRabbit pós-push.

positive_findings:
  - id: POS-001
    description: >
      Extração de helpers puros (shouldAssignPipelineBroker / resolveNotificationBrokerUserId)
      é a decisão de design correta: encapsula a regra do ADR-001 num único lugar, garante que
      B1 e B2 sejam idênticos por construção (DRY), e torna a decisão do guard testável de forma
      determinística sem mockar a integração inteira. Segue o padrão estabelecido de hasConfirmedDay.
  - id: POS-002
    description: >
      Separação dono/especialista implementada com rigor: o corretor do IMÓVEL continua em
      appointments.broker_id e em broker_user_id (contexto/observabilidade), enquanto o
      notification_broker_user_id resolve corretamente o destinatário — dono atual quando o
      guard bloqueia, corretor do imóvel quando o lead era NULL. Exatamente o que o AC5 pede.
  - id: POS-003
    description: >
      Backward compatibility cuidadosa nos handlers: notification_broker_user_id ?? broker_user_id
      garante que eventos antigos (51-3) sem o novo campo continuam notificando via broker_user_id.
      A mudança da condição (de gatear em broker_user_id para gatear em event_type + recipient
      resolvido) é necessária e correta para AC5 sem regredir o caminho NULL.
  - id: POS-004
    description: >
      Anti-hallucination disciplinado: o @dev respeitou os gotchas da story (RLS 085 unversioned,
      .single() pré-existente intocado, is_ai_active não tocado, notify-appointment.ts inalterado)
      e documentou tudo nas Completion Notes. git diff confirma cada uma dessas afirmações.

