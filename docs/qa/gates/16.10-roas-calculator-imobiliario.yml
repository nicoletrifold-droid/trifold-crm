schema: 1
storyId: "16.10"
title: "ROAS Calculator Imobiliário"
gate: PASS
verdict: PASS
reviewer: "@qa (Quinn)"
reviewed_at: "2026-04-27"
updated: "2026-04-27T00:00:00Z"
review_iteration: 2

status_reason: >
  Re-review da v1.1 da migration. Bug crítico CORR-001 RESOLVIDO. O refactor
  para CTEs por dimensão eliminou completamente o fan-out multiplicativo. Cada
  CTE agora produz no máximo 1 linha por campanha; o SELECT final apenas combina
  totais já sumarizados via LEFT JOIN em chave única. Worked example
  (30 dias × 5 leads × 2 vendas) confirma valores corretos algebricamente:
  total_spend=R$3.000, total_revenue=R$1.000.000, roas=333.33, cpl_real=R$600.
  AC2, AC4, AC6 e AC7 passam de FAIL/CONCERNS para PASS. Issues remanescentes
  (PERF-001 e OBS-001) são LOW e não bloqueantes. Comentários da migration
  atualizados (resolve DOC-001). Aprovada para deploy em staging e produção.

# ─────────────────────────────────────────────────────────────────────────────
# CORR-001 RESOLUTION
# ─────────────────────────────────────────────────────────────────────────────
corr_001_resolution:
  status: RESOLVED
  fix_version: "v1.1 (2026-04-27)"
  fix_strategy: "Refactor para 3 CTEs por dimensão (cada CTE produz 1 linha por campanha; JOIN final 1:1)"

  cte_structure:
    spend_per_campaign:
      lines: "63-72"
      tables: ["meta_insights_daily"]
      joins: "NENHUM — agregação sobre 1 única tabela"
      output: "1 linha por (org_id, entity_id) — fan-out matematicamente impossível"
      sums_isolated: true

    leads_per_campaign:
      lines: "91-103"
      tables: ["meta_campaigns", "leads"]
      joins: "LEFT JOIN simples 1:N"
      output: "1 linha por mc.id via GROUP BY"
      dedup: "COUNT(DISTINCT l.id) — semanticamente correto para deduplicação 1:N"

    sales_per_campaign:
      lines: "126-143"
      tables: ["meta_campaigns", "leads", "kanban_stages", "unit_sales"]
      joins: "INNER JOINs em pipeline; cada unit_sale tem exatamente 1 lead → sem duplicação de unit_sales"
      output: "1 linha por mc.id via GROUP BY"
      sums_isolated: "SUM(us.sale_price) — meta_insights_daily NÃO está nesta CTE, então dias não multiplicam revenue"

  final_select:
    lines: "160-201"
    join_topology: "1:1 — mc LEFT JOIN spc (chave: org_id+meta_campaign_id) + LEFT JOIN lpc (chave: mc.id) + LEFT JOIN salc (chave: mc.id)"
    fan_out_possible: false
    cardinality_proof: "Cada CTE garante <=1 linha por mc.id ou (org_id, meta_campaign_id) via GROUP BY. JOIN com cardinalidade 1:<=1 não pode produzir fan-out."

  worked_example_verification:
    scenario: "Campanha X: 30 dias × R$100/dia = R$3.000 spend, 5 leads (utm=X.name), 2 vendas × R$500.000 = R$1.000.000 revenue"
    expected:
      total_spend: 3000
      total_revenue: 1000000
      leads_in_crm: 5
      sales_count: 2
      roas: 333.33
      cpl_real: 600
    v1_0_buggy:
      total_spend: 15000  # 5x inflado
      total_revenue: 30000000  # 30x inflado
      roas: 2000  # 6x errado
      cpl_real: 3000  # 5x errado
    v1_1_correct:
      total_spend: 3000  # ✓
      total_revenue: 1000000  # ✓
      roas: 333.33  # ✓
      cpl_real: 600  # ✓
    verification_method: "Análise algébrica estática + worked example documentado in-line na migration (linhas 152-158)"

# ─────────────────────────────────────────────────────────────────────────────
# AC COVERAGE (Re-evaluated)
# ─────────────────────────────────────────────────────────────────────────────
ac_coverage:
  - id: AC1
    status: PASS
    note: "Migration sintática válida. DROP VIEW IF EXISTS + CREATE OR REPLACE VIEW (linhas 44-46). Idempotente."
    delta: "unchanged from v1.0 review"

  - id: AC2
    status: PASS
    note: |
      Colunas presentes e tipadas corretamente: org_id, meta_campaign_id,
      campaign_name, total_spend (numeric(12,2)), total_leads_meta (bigint),
      leads_in_crm (bigint), sales_count (bigint), total_revenue (numeric(12,2)),
      roas (numeric(10,4)), cpl_real (numeric(12,2)).
      Valores numéricos AGORA SÃO CORRETOS — fan-out resolvido pelo refactor em CTEs.
      total_spend reflete soma única de meta_insights_daily.spend; total_revenue
      reflete soma única de unit_sales.sale_price (apenas leads em stage 'fechado').
      Branch `metadata->>'campaign_id'` removido conforme decisão da v1.0 (coluna
      não existe; documentado nos comentários da migration).
    delta: "FAIL → PASS"

  - id: AC3
    status: PASS
    note: "View NÃO usa SECURITY DEFINER. RLS herdada das tabelas base. Cross-org isolation via org_id filter em joins + .eq(org_id) no endpoint."
    delta: "unchanged from v1.0 review"

  - id: AC4
    status: PASS
    note: |
      Null-safety formal correta E semanticamente correta:
        • roas: CASE WHEN COALESCE(spc.total_spend, 0) > 0 THEN ... ELSE NULL (linhas 181-185)
        • cpl_real: CASE WHEN COALESCE(lpc.leads_in_crm, 0) > 0 THEN ... ELSE NULL (linhas 188-192)
        • total_spend: COALESCE(spc.total_spend, 0)::numeric(12,2) — nunca NULL (linha 166)
        • total_revenue: COALESCE(salc.total_revenue, 0)::numeric(12,2) — nunca NULL (linha 178)
      Agora que os valores subjacentes são corretos, a divisão por zero é o ÚNICO
      caso possível para NULL — semântica preservada.
    delta: "CONCERNS → PASS"

  - id: AC5
    status: CONCERNS
    note: |
      Índices existentes (idx_meta_campaigns_org_campaign_id, idx_meta_insights_org_level_date,
      idx_leads_org_id, idx_leads_stage) cobrem o acesso primário. PERF-001 mantido:
      unit_sales(lead_id) sem índice — não bloqueante para volumes atuais (<10k vendas).
      Para a CTE sales_per_campaign, o planner provavelmente usará hash join em
      unit_sales — aceitável até 100k vendas.
    delta: "unchanged from v1.0 review"

  - id: AC6
    status: PASS
    note: |
      Endpoint 16.9 (route.ts:367-393) consome a view com SELECT explícito de
      6 colunas (total_spend, leads_in_crm, sales_count, total_revenue, roas, cpl_real)
      + .eq("meta_campaign_id", ...).eq("org_id", appUser.org_id).maybeSingle().
      Após aplicar a v1.1, roas_summary deixa de ser null E os valores retornados
      são CORRETOS. Sem regressão funcional.
    delta: "FAIL → PASS"

  - id: AC7
    status: PASS
    note: |
      Edge cases verificados:
        • Campanha sem spend → spc retorna NULL → COALESCE → 0 → roas = NULL ✓
        • Campanha sem leads CRM → lpc.leads_in_crm = 0 → cpl_real = NULL ✓
        • Campanha sem vendas → salc retorna NULL → COALESCE → 0 → total_revenue = 0 ✓
        • Campanha com 1+ leads + 1+ vendas + 1+ dia → valores corretos (não mais bugados) ✓
      Tolerância a edge cases mantida e expandida (casos com >=2 leads agora corretos).
    delta: "CONCERNS → PASS"

  - id: AC8
    status: PASS
    note: "DROP VIEW IF EXISTS public.meta_campaign_roas + CREATE OR REPLACE VIEW. Combo idempotente."
    delta: "unchanged from v1.0 review"

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY (re-validated, unchanged from v1.0)
# ─────────────────────────────────────────────────────────────────────────────
security:
  rls_coverage: PASS
  cross_org_isolation: PASS
  description_cross_org: |
    v1.1 mantém os filtros explícitos de org_id em cada JOIN das CTEs:
    • spend_per_campaign: GROUP BY org_id (não há JOIN, mas particiona por org)
    • leads_per_campaign: l.org_id = mc.org_id no LEFT JOIN
    • sales_per_campaign: l.org_id = mc.org_id e us.org_id = mc.org_id nos JOINs
    Nenhum vetor de cross-org leak introduzido pelo refactor.
  security_definer: PASS
  sql_injection: PASS
  privilege_escalation: PASS

# ─────────────────────────────────────────────────────────────────────────────
# CORRECTNESS / SQL REVIEW (re-evaluated)
# ─────────────────────────────────────────────────────────────────────────────
sql_review:
  syntax: PASS
  table_columns_exist: PASS
  joins_correct: PASS
  description_joins: |
    v1.1 elimina o fan-out via 3 CTEs:
    • spend_per_campaign — sem JOIN (1 tabela), 1 linha por (org_id, entity_id)
    • leads_per_campaign — LEFT JOIN 1:N + COUNT(DISTINCT) + GROUP BY → 1 linha por mc.id
    • sales_per_campaign — pipeline INNER JOIN com SUM(sale_price) isolado de meta_insights_daily
    SELECT final faz LEFT JOIN 1:1 das CTEs já sumarizadas. Topologia correta.
  group_by_complete: PASS
  null_safety: PASS
  idempotency: PASS
  fan_out_handling: PASS
  description_fan_out: |
    CORR-001 totalmente resolvido. Comentários por CTE (linhas 48-72, 74-103, 105-143)
    documentam explicitamente porque cada CTE não pode produzir fan-out. Worked example
    in-line (linhas 152-158) demonstra cálculo correto.

