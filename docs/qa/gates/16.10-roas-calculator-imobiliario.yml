# ─────────────────────────────────────────────────────────────────────────────
# RUNTIME TESTS — STILL WAIVED (Supabase local indisponível)
# ─────────────────────────────────────────────────────────────────────────────
waived_tests:
  reason: |
    Supabase local não disponível neste ambiente de QA. Cenários 1-6 da story
    (Testing) requerem `supabase db push` + queries SQL contra dataset realista.
    Bug CORR-001 detectado E validado via análise algébrica estática + worked
    example. O refactor v1.1 também foi validado por análise algébrica:
      • spend_per_campaign: agregação sobre 1 tabela → matematicamente impossível
        produzir mais de 1 linha por (org_id, entity_id) ou somar duplicatas
      • leads_per_campaign: COUNT(DISTINCT) já era correto na v1.0 → preservado
      • sales_per_campaign: SUM(sale_price) isolado de meta_insights_daily → dias
        não podem multiplicar revenue
  waiver_active: true
  waiver_authority: "@qa (Quinn)"
  recommended_post_deploy_validation: |
    Em staging, antes de aplicar em produção:
      1. supabase db push (verificar idempotência — Cenário 5)
      2. Inserir campanha sintética com 30 dias × 5 leads × 2 vendas
      3. SELECT * FROM meta_campaign_roas WHERE meta_campaign_id = <X>
         Esperado: total_spend=3000, total_revenue=1000000, roas≈333.33, cpl_real=600
      4. Comparar SUM direto:
           SELECT SUM(spend) FROM meta_insights_daily WHERE level='campaign' AND entity_id=<X>
         Esperado: bate exatamente com total_spend da view
      5. Comparar revenue direto:
           SELECT SUM(us.sale_price) FROM unit_sales us
            JOIN leads l ON l.id = us.lead_id
            JOIN kanban_stages ks ON ks.id = l.stage_id AND ks.type='fechado'
            WHERE l.utm_campaign = <X.name>
         Esperado: bate exatamente com total_revenue da view

