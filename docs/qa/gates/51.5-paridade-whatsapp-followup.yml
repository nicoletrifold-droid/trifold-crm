title: "Paridade WhatsApp no Envio Automático de Follow-up (Nicole)"
epic: 51
gate: PASS
verdict: PASS
status_reason: >
  Os 8 ACs estão atendidos por código com evidência path:linha e cobertos por 11 testes
  verdes (Telegram roteia sem WhatsApp / WhatsApp na janela envia com body correto /
  fora da janela skip sem rede / API 500 sem throw / last_message_at nulo tratado como
  fora / config ausente sem rede / timeout). O comportamento crítico de produção é correto:
  fora da janela de 24h NÃO há chamada de rede (route.ts:91-93), o follow_up_log grava
  status='skipped' + metadata.reason='WHATSAPP_WINDOW_CLOSED' (282-292) e a mensagem NÃO é
  persistida em `messages` nem bumpa last_message_at (guard `if (!skipped)` em 316/514).
  Telegram preservado verbatim (AC2, mesmo Bot API e timeout 30s). Credenciais vêm de
  whatsapp_config por org_id+status='active' (96-101), padrão idêntico a
  appointment-whatsapp-reminders — nunca env vars. Helper never-throws (AC5) e ambos os
  call-sites (nicole_takeover ~268 e post-visit ~467) tratados. is_ai_active NÃO é tocado
  (grep zero ocorrências). type-check web 0 erros; ESLint exit 0 nos 3 arquivos; suite
  whatsapp+broker 38/38. As 6 falhas pré-existentes do webhook 21.1 (alias @web/* no vitest)
  permanecem inalteradas — confirmado por git stash. Uma observação LOW sobre a métrica
  messages_sent (telemetria) não bloqueia: ground-truth correto está em follow_up_log.status.
