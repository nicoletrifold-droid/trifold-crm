  - ac: "AC5"
    status: PASS
    note: "packages/web/src/lib/telegram.ts criado com sendTelegramAdminAlert. webhook-health/route.ts atualizado para importar de @web/lib/telegram (função local removida). meta-sync-entities e meta-sync-insights também importam da lib. Zero duplicação."

issues:
  - id: ALERT-REPEAT-001
    severity: low
    category: behavior
    description: >
      O cron meta-sync-health roda a cada 4h e envia alerta Telegram a cada execução
      enquanto a condição de falha persistir (sync stale ou token inválido). Em cenários
      de falha prolongada, o admin recebe até 3-4 alertas iguais por dia. Não há
      deduplicação ou cooldown entre alertas. AC1 não exige cooldown — comportamento
      é tecnicamente correto conforme spec.
    recommendation: >
      Implementar cooldown de 12h por tipo de alerta em story futura (ex: flag
      last_alerted_at em meta_sync_log ou meta_ad_accounts). Baixo impacto no fluxo atual
      — poucas falhas esperadas em operação normal.
    blocking: false

