storyId: "16.5"
title: "Cron Sync — Insights Diários (Meta Ads)"
verdict: PASS
reviewer: "@qa (Quinn)"
reviewedAt: "2026-04-27"

summary: |
  Implementação sólida seguindo o padrão estabelecido em 16.4. Todos os 10 ACs atendidos.
  entity_id correto por nível (Meta ID, não UUID), conversão de tipos precisa (parseFloat para
  métricas monetárias, parseInt/Math.round para contagens), extração de actions[] robusta com
  fallback "0"/"null" adequados. MetaOAuthException sem 5xx. Sem issues CRITICAL ou HIGH.
  2 achados MEDIUM não-bloqueantes documentados.

issues:
  - id: M-001
    severity: medium
    category: robustness
    file: "packages/web/src/app/api/cron/meta-sync-insights/route.ts"
    line: 120
    description: |
      Insert em meta_sync_log não verifica erro de escrita. Se a inserção falhar,
      syncLog = null e o sync continua sem rastreamento. Os guards `if (syncLog)`
      presentes em todo o código previnem crash, mas uma falha de DB no log
      passaria silenciosamente — mesmo padrão de M-001 do 16.4.
    fix_required: false
    recommendation: |
      Adicionar log de warning quando syncLog é null após o insert:
        const { data: syncLog, error: logErr } = await supabase...
        if (logErr) console.warn('[META_INSIGHTS] Failed to create sync log:', logErr.message)

  - id: M-002
    severity: medium
    category: maintainability
    file: "packages/web/src/app/api/cron/meta-sync-insights/route.ts"
    line: 148
    description: |
      Mapeamento de campos dos insights está duplicado 3 vezes (campaign/adset/ad).
      O código é funcional e correto, mas uma função auxiliar buildInsightRow() reduziria
      a superfície de manutenção futura se novos campos forem adicionados.
    fix_required: false
    recommendation: |
      Refatorar oportunisticamente em Story 16.7 (backfill) que já tocará este arquivo.

