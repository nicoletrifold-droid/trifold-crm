summary: >
  Implementação utilitária Tailwind fiel ao spec. Correção do problema de sobreposição do
  chat (h-screen → h-[100dvh] + pb-16 lg:pb-0), contraste visual de mensagens, separadores
  de data com React.Fragment, tap targets 44x44 com aria-label, active state da tab bar com
  indicador visual + aria-current, e item "Notificações" adicionado em sidebar desktop +
  header mobile. Realtime, upload e envio de mensagem preservados.

