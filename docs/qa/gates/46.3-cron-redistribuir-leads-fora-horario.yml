    note: "route.ts:61-64 (503 se !CRON_SECRET) + 65-67 (401 se authHeader !== Bearer). Testes route.test.ts:133-140 (503) e 142-147 (401), ambos com distributeMock.not.toHaveBeenCalled()."
  - ac: "AC2"
    status: Met
    note: "Stage default por org (resolveDefaultStageId, route.ts:24-47) + filtro leads (102-109) + chamada distributeLeadToNextBroker(lead.id, lead.org_id) (124-127). Teste route.test.ts:149-166 confirma chamada com ('lead-1','org-1') e body processed:1/distributed:1."
  - ac: "AC3"
    status: Met
    note: "Filtro .eq('stage_id', stageId) (route.ts:108) onde stageId = stage is_default da org. Leads em '62075f72-old'/'dab590c7-muffato' não estão no default → excluídos. Teste route.test.ts:168-180 confirma not.toHaveBeenCalled + processed:0."
  - ac: "AC4"
    status: Met
    note: ".is('assigned_broker_id', null) (route.ts:107). Teste route.test.ts:182-194 (lead com assigned_broker_id='broker-9') confirma not.toHaveBeenCalled."
  - ac: "AC5"
    status: Met
    note: "try/catch por lead (route.ts:123-132): catch → console.error + failed++; loop continua. Teste route.test.ts:196-212 (mockRejectedValueOnce) confirma 200 com processed:2/distributed:1/failed:1."
  - ac: "AC6"
    status: Met
    note: "if (leads.length === MAX_LEADS_PER_ORG) limited = true (route.ts:119). Response { processed, distributed, failed, limited } (136). Teste route.test.ts:214-231 (60 leads) confirma 50 chamadas + limited:true."
  - ac: "AC7"
    status: Met
    note: "vercel.json:95-98 — { path: '/api/cron/roleta-redistribute', schedule: '0 11 * * *' }. 11h UTC = 8h SP (UTC-3). Confirmado igual a email-automations (61) e meta-ads-intelligence (69); NÃO '0 8' (= 5h SP, erro do keep-alive linha 41). As 18 entradas existentes preservadas."
  - ac: "AC8"
    status: Met
    note: "pnpm --filter @trifold/web type-check → 0 erros. ESLint route.ts + __tests__/route.test.ts → exit 0, zero hits."

issues:
  - id: PERF-001
    severity: low
    category: performance
    finding: >
      O limite .limit(50) é por org e a flag limited é global. Numa instância
      futura com muitas orgs, uma única execução poderia processar 50*N leads e
      aproximar do timeout de 60s (estimativa ~25s para 50 leads). A instância atual
      tem 1 org, então não é risco hoje. O loop por org é sequencial (correto para o
      advisory lock do RPC), o que agrava o tempo total em multi-org de alto volume.
    suggested_action: >
      Não-bloqueante hoje (1 org). Em cenário multi-org de alto volume, considerar um
      teto global de leads por execução além do teto por org, ou paginação com cursor
      entre execuções. Monitorar duração via logs do Vercel Cron.
  - id: TEST-001
    severity: low
    category: testing
    finding: >
      Testes via mock in-memory do Supabase (não banco real). O caminho de
      integração real cron→distributor→RPC depende do alias @web/* (mesma causa raiz
      herdada das stories 21.1/50-x/51-x). distributor.ts tem cobertura própria e não
      foi tocado.
    suggested_action: >
      Validar por smoke pós-deploy (GET com Authorization: Bearer <CRON_SECRET> →
      confirmar contadores; sem header → 401). Compartilhar backlog do resolve.alias
      @web/* no vitest.
  - id: OBS-001
    severity: low
    category: tooling
    finding: >
      CodeRabbit CLI não executado (config WSL; host de review é macOS/darwin).
    suggested_action: >
      Não-bloqueante. Análise manual cobriu os 7 quality checks. CI pode rodar
      CodeRabbit pós-push.

positive_findings:
  - id: POS-001
    description: >
      Schedule UTC correto (0 11 = 8h SP) com o gotcha documentado no JSDoc e no Dev
      Agent Record, evitando ativamente o erro do keep-alive (0 8 = 5h SP). Verificado
      contra os crons de referência email-automations/meta-ads-intelligence.
  - id: POS-002
    description: >
      Resolução de stage default escopada por org com .maybeSingle() (não .single())
      é a decisão correta: is_default não tem unique constraint global, e .maybeSingle()
      degrada graciosamente (null → pula a org) em vez de lançar. ADAPT consciente do
      getDefaultStageId, com JSDoc explicando o porquê da divergência.
  - id: POS-003
    description: >
      Estratégia de exclusão de stages históricos por construção (filtro por stage
      default) em vez de hardcodar UUIDs — mais robusta e auto-mantida. Os UUIDs reais
      ficam documentados no Dev Agent Record sem acoplar o código a eles.
  - id: POS-004
    description: >
      Idempotência natural via .is('assigned_broker_id', null): reexecuções (retry do
      Vercel) não reprocessam leads já distribuídos. Best-effort em camadas (config,
      por-org, por-lead) garante que o cron nunca derruba por uma falha isolada.

