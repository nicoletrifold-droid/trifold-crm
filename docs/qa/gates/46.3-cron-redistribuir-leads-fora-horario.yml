title: "Cron de Abertura Redistribui Leads Represados da Roleta"
epic: 46
gate: PASS
verdict: PASS
status_reason: >
  Os 8 ACs estão atendidos por código com evidência path:linha e cobertos por 8
  testes verdes (route.test.ts). Os pontos críticos foram verificados diretamente:
  (1) Schedule UTC correto — vercel.json:96-97 usa "0 11 * * *" (11h UTC = 8h SP
  UTC-3), confirmado igual a email-automations/meta-ads-intelligence e NÃO "0 8"
  (erro do keep-alive = 5h SP). (2) Auth CRON_SECRET fail-closed — 503 sem secret,
  401 Bearer inválido (route.ts:60-67), cópia verbatim do followup cron. (3) Filtro
  multi-org seguro — resolve o stage default POR org via .maybeSingle() escopado
  por org_id (route.ts:24-47), filtra leads por org_id + is_active + assigned_broker_id
  IS NULL + stage_id default (102-109); stages "Corretores Antigos" (62075f72-) e
  "Ação Muffato" (dab590c7-) são excluídos por construção (não são is_default).
  (4) Idempotência via .is("assigned_broker_id", null). (5) Limite .limit(50) por
  org com flag limited. REUSE total do distributor.ts (não tocado). type-check (web)
  0 erros; ESLint nos 2 arquivos exit 0; 8/8 testes passam. As 6 falhas
  pré-existentes do webhook whatsapp 21.1 permanecem inalteradas.
reviewer: "Quinn (@qa)"
reviewedAt: "2026-06-11"
updated: "2026-06-11T17:15:00Z"
iteration: 1
quality_score: 95
waiver: { active: false }

quality_checks:
  - check: "1. Requirements Traceability"
    status: PASS
    note: >
      AC1-AC8 mapeados para código e teste. AC1 (auth fail-closed 503/401,
      route.ts:60-67; testes 133-147). AC2 (lead elegível no stage default → chama
      distribuir, route.ts:121-128; teste 149-166). AC3 (stages históricos excluídos
      pelo filtro stage_id default, route.ts:108; teste 168-180 usa ids fictícios
      62075f72-/dab590c7-). AC4 (filtro IS NULL, route.ts:107; teste 182-194). AC5
      (try/catch por lead, route.ts:123-132; teste 196-212). AC6 (limited quando
      length===50, route.ts:119; teste 214-231). AC7 (vercel.json:96-97 "0 11 * * *").
      AC8 (type-check+lint verdes). Ver tabela ac_traceability.

  - check: "2. Code Quality & Standards"
    status: PASS
    note: >
      ADAPT correto (IDS): resolveDefaultStageId replica a estratégia de
      getDefaultStageId do meta webhook (is_default por org + fallback por position)
      mas troca .single() por .maybeSingle() — decisão defensiva multi-org bem
      justificada no JSDoc (is_default não tem unique constraint global). REUSE total
      de distributeLeadToNextBroker (engine não tocada). Auth fail-closed copiado
      verbatim do followup cron. maxDuration=60 declarado. Constantes nomeadas
      (MAX_LEADS_PER_ORG). Imports absolutos @web/*. JSDoc abrangente documentando
      o gotcha UTC e a estratégia de stage. Sem código morto.

  - check: "3. Security / Correctness"
    status: PASS
    note: >
      Auth fail-closed verificado: 503 se CRON_SECRET ausente (route.ts:61-64) ANTES
      de qualquer query — não vaza estado; 401 se Bearer não bate (65-67). Padrão
      idêntico ao followup cron. createAdminClient() usado conscientemente (cron não
      tem sessão; bypassa RLS por design, igual followup). O endpoint não é exposto
      indevidamente: GET autenticado por secret, sem parâmetros de usuário (sem
      IDOR). O filtro por stage default da org garante isolamento multi-org — leads
      de uma org nunca são distribuídos no contexto de outra (org_id propagado de
      lead.org_id para distributeLeadToNextBroker, route.ts:124-127).

  - check: "4. Reliability / Error Handling"
    status: PASS
    note: >
      Best-effort em duas camadas: (a) erro ao carregar roleta_config → 500 com
      mensagem (route.ts:78-81); (b) erro ao resolver stage ou query de leads de uma
      org → console.error + continue (pula a org, não derruba o cron, 94-97/111-114);
      (c) try/catch individual por lead (123-132) — uma falha de RPC incrementa
      failed e o loop continua. O endpoint sempre retorna 200 com contadores parciais
      quando passou da auth (exceto o 500 de config). Teste AC5 confirma
      distributed:1/failed:1 com 2 leads (um rejeita). Idempotência natural via
      filtro IS NULL: reexecução não reprocessa.

  - check: "5. Test Architecture"
    status: PASS
    note: >
      8 testes cobrindo os 7 cenários obrigatórios + auth duplo (503 e 401
      separados). Mock in-memory do Supabase chainable suportando eq/is/order/limit/
      maybeSingle + thenable terminal para list queries — fiel à API usada pela rota.
      AC3 usa stage ids fictícios prefixados 62075f72-/dab590c7- (alinhado aos UUIDs
      reais documentados no Dev Agent Record) para provar a exclusão por stage
      default. vi.resetModules() no beforeEach garante que o module-scope CRON_SECRET
      é relido (crítico para o teste 503 que deleta a env). Mocka @web/lib/roleta/
      distributor e @web/lib/supabase/admin — evita o problema de alias que afeta o
      teste real do webhook whatsapp. Cobertura excelente para um endpoint novo.

  - check: "6. NFR (Performance)"
    status: PASS
    note: >
      Sem N+1 problemático: 1 query de roleta_config + por org [1 resolução de stage
      (até 2 queries com fallback) + 1 query de leads com .limit(50)] + N chamadas a
      distributeLeadToNextBroker (loop sequencial intencional para respeitar o
      advisory lock por org do RPC). Limite .limit(50) por org previne timeout
      (Vercel 60s; estimativa ~25s para 50 leads, margem segura). maxDuration=60
      declarado. limited:true alerta o admin quando há overflow. A sequencialidade
      do loop é correta — paralelizar quebraria a serialização round-robin do RPC.

  - check: "7. Regression Risk"
    status: PASS
    note: >
      Endpoint NOVO + 1 entrada aditiva no vercel.json (as 18 entradas existentes
      preservadas — confirmado no diff: +4 linhas = um objeto cron). Nenhum cron
      existente alterado. distributor.ts intocado (sem risco a webhook WhatsApp/Meta
      nem ao endpoint manual). type-check web 0 erros; 8/8 testes verdes. As 6 falhas
      pré-existentes de webhook/whatsapp/__tests__/route.test.ts (alias @web/*, Story
      21.1) permanecem IDÊNTICAS — vitest.config.ts não tocado. Sem migration,
      rollback trivial (remover o endpoint + a entrada do vercel.json).

