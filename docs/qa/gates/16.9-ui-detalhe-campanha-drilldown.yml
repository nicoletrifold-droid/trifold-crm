security:
  auth_coverage: PASS
  description: "requireAuth() na rota; .eq(org_id, appUser.org_id) em todas as 7 queries (campaign, campaign-insights, adsets, adset-insights, leads, allLeads, ROAS). 404 (não 403) para cross-org evita info leak."
  role_enforcement: NOT_REQUIRED
  description_role: "Story é read-only de dashboards — sem requireRole específico (qualquer usuário do org pode ver). isAdmin é prop futura para CTA admin-only mas não bloqueante aqui."
  rls_coverage: PASS
  description_rls: "Supabase client server-side respeita RLS — kanban_stages tem RLS por org (verificado em 004_rls_policies.sql)."
  secrets_handling: PASS
  description_secrets: "Nenhum segredo manipulado nesta story (read-only)."
  data_exposure: PASS
  description_exposure: "Resposta do endpoint não expõe campos sensíveis (sem tokens, sem org_id de outras orgs); join com kanban_stages limita a campo 'type'."
  sql_injection: PASS
  description_sqli: "Uso correto do query builder Supabase com parâmetros nomeados (.eq, .in, .gte, .lte). Nenhum string-concat de input."

issues:
  - id: "MNT-001"
    severity: low
    category: maintainability
    description: >
      Helpers extraídos em meta-format.ts/meta-constants.ts mas 16.8 (campaigns-meta-client.tsx)
      AINDA mantém cópias locais de formatBRL, formatBudget, formatNumber, formatPercent,
      STATUS_BADGES, OBJECTIVE_LABELS. Não é regressão (16.8 funciona), mas a oportunidade
      IDS REUSE prometida nas notas do dev ficou pela metade.
    finding: "Duplicação parcial: 16.9 importa de @web/lib/meta-format e @web/lib/meta-constants, 16.8 ainda tem cópias locais."
    suggested_action: "Em story de housekeeping (não-bloqueante), refatorar 16.8 para importar dos novos arquivos compartilhados."

  - id: "REL-001"
    severity: low
    category: reliability
    description: >
      Queries Supabase no endpoint não fazem check explícito de result.error (exceto ROAS).
      Se uma query falhar (ex: timeout, erro de RLS), o handler segue com array vazio.
      No melhor caso isso é graceful degradation; no pior, mascara bugs de schema/RLS.
    finding: "campaign-insights, adsets, adset-insights, leads, allLeads queries usam apenas (rawX ?? []) — error silenciado."
    suggested_action: "Em story futura, adicionar console.error/log estruturado quando result.error for truthy (similar ao gotcha de 16.8)."

  - id: "REQ-001"
    severity: low
    category: requirements
    description: >
      AC5/AC6 originais especificavam associação lead↔campanha via 'utm_campaign OR metadata->>campaign_id'.
      Schema atual não tem coluna metadata jsonb em leads — dev removeu o segundo predicado.
      Consequência: leads sem utm_campaign preenchido (ex: vindos do webhook Meta com campaign_id
      no campo do form) podem não aparecer no funil/lista.
    finding: "Associação só via utm_campaign exact match — funciona mas pode subestimar cobertura do funil."
    suggested_action: "Em Story 16.10 ou separada, avaliar adicionar coluna meta_campaign_id em leads (FK) ou pelo menos campos para metadata do form."

  - id: "MNT-002"
    severity: low
    category: maintainability
    description: >
      parseDays aceita valores entre 1 e 365, mas AC1/AC9 só esperam 7/30/90. Não é bug
      (cap em 365 é defensivo), mas API aceita ?days=42 silenciosamente, o que pode confundir
      consumidores futuros.
    finding: "parseDays não valida whitelist [7,30,90] — aceita qualquer inteiro 1-365."
    suggested_action: "Documentar comportamento ou apertar validação para [7,30,90] em refactor."

  - id: "MNT-003"
    severity: low
    category: code
    description: >
      buildTimeseries inclui um dia a mais que o solicitado (cursor inclusivo + range 'today - days' até 'today').
      Resultado: ?days=7 retorna 8 dias. Documentado nos testes da story como '7+1'. Não é bug
      crítico mas inconsistente com leitura literal de 'últimos 7 dias'.
    finding: "Range from = today - days, to = today, cursor inclusivo → 8 elementos para days=7."
    suggested_action: "Decisão consciente do dev; aceitável. Caso queira ajustar, mudar from = today - (days - 1)."

  - id: "MNT-004"
    severity: low
    category: code
    description: >
      Prop isAdmin é passada de page.tsx → campaign-detail-client.tsx mas o client component
      destructura apenas {campaignId} (linha 44), efetivamente ignorando isAdmin. Não é bug
      (TypeScript permite props extras), mas é dead-prop indicando feature inacabada ou
      preparação para CTA admin-only futuro.
    finding: "isAdmin é prop declarada na interface Props mas não consumida no componente."
    suggested_action: "Remover prop ou adicionar TODO comment indicando uso futuro."

