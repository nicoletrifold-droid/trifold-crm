status_reason: >
  Todos os 15 ACs satisfeitos. Auth correta (401/404 sem vazamento de existência cross-org),
  graceful fallback do ROAS, divisão por zero protegida no funil, tipos sem any explícito,
  helpers extraídos em meta-format.ts/meta-constants.ts seguindo IDS REUSE > ADAPT > CREATE
  sem quebrar 16.8. Dois desvios documentados (Recharts→SVG nativo; metadata->>campaign_id
  removido por inexistência no schema) tecnicamente sólidos e justificados.

