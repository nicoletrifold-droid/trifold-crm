schema: 1
storyId: "46.2"
story: "46-2"
title: "Webhook do Meta Aciona a Roleta de Distribuição"
epic: 46
gate: PASS
verdict: PASS
status_reason: >
  Os 6 ACs estão atendidos por código com evidência path:linha e cobertos por 4
  testes verdes (route.roleta.test.ts). O invariante P0 ADR-001 (precedência
  Ação humana > Roleta > Pipeline) foi verificado DIRETAMENTE no código: a chamada
  distributeLeadToNextBroker está EXCLUSIVAMENTE dentro do bloco if (newLead?.id)
  do branch else (lead recém-inserido via insert — meta-ads/route.ts:241-243), e
  NUNCA no branch if (leadId) de update de lead existente (linhas 202-210, que só
  toca metadata/utm). Isso é crítico porque o RPC roleta_pick_and_advance faz
  UPDATE incondicional de assigned_broker_id (migration 071, linha 94): chamar a
  roleta sobre um lead já atribuído roubaria o corretor. A chamada é best-effort
  (void ... .catch) idêntica ao padrão validado do webhook WhatsApp
  (whatsapp/route.ts:544-546). type-check (web) 0 erros; ESLint nos 2 arquivos
  exit 0; 4/4 testes passam. As 6 falhas pré-existentes do webhook whatsapp 21.1
  (alias @web/* no vitest) permanecem inalteradas — vitest.config.ts e a rota
  whatsapp não foram tocados.
reviewer: "Quinn (@qa)"
reviewedAt: "2026-06-11"
updated: "2026-06-11T17:15:00Z"
iteration: 1
quality_score: 100
waiver: { active: false }

quality_checks:
  - check: "1. Requirements Traceability"
    status: PASS
    note: >
      AC1-AC6 mapeados para código e teste. AC1 (chamada da roleta no caminho de
      lead novo, meta-ads/route.ts:241-243; teste AC1 confirma 1 chamada com
      (leadId, orgId)). AC2 (lead existente não chama a roleta — branch if (leadId)
      linhas 202-210 só toca metadata/utm; teste AC2 confirma not.toHaveBeenCalled
      e broker preservado). AC3 (fora_horario — mock retorna status fora_horario,
      webhook ainda 200). AC4 (falha capturada pelo .catch, webhook não falha; teste
      AC4 com mockRejectedValue). AC5 (type-check+lint verdes). AC6 (import absoluto
      @web/lib/roleta/distributor, meta-ads/route.ts:6, consistente com
      whatsapp/route.ts:8). Ver tabela ac_traceability.

  - check: "2. Code Quality & Standards"
    status: PASS
    note: >
      REUSE exemplar (IDS): nenhuma linha do distributor.ts foi tocada; toda a
      lógica de horário/round-robin/limites/notificação/log é herdada de
      distributeLeadToNextBroker. O padrão de chamada é cópia verbatim do webhook
      WhatsApp validado (void ... .catch, sem await, sem try/catch adicional). Diff
      cirúrgico: 8 linhas (import + comentário ADR-001 + a chamada). Comentário
      inline documenta a decisão de design ADR-001 no ponto exato da chamada. Import
      absoluto @web/*. Sem código morto, sem duplicação de engine.

  - check: "3. Security / Correctness"
    status: PASS
    note: >
      O invariante ADR-001 é cumprido por construção: a chamada da roleta está
      DENTRO do if (newLead?.id) (lead recém-criado, assigned_broker_id IS NULL por
      construção), nunca no caminho de update. Verifiquei contra migration 071:94
      (UPDATE leads SET assigned_broker_id = v_user_id WHERE id = p_lead_id — sem
      cláusula NULL), confirmando que chamar a roleta sobre lead já atribuído
      roubaria o corretor; o código evita isso estruturalmente. Defesa em
      profundidade adicional: o próprio distributor.ts (linhas 103-114) prioriza
      lead ativo por phone, roteando ao corretor existente. A verificação de
      assinatura HMAC (x-hub-signature-256) e o fail-closed por META_APP_SECRET já
      existiam e não foram alterados.

  - check: "4. Reliability / Error Handling"
    status: PASS
    note: >
      Best-effort honrado: void distributeLeadToNextBroker(...).catch(console.error)
      garante que uma falha de RPC/rede não derruba o webhook (o 200 já foi retornado
      via after()). Teste AC4 prova que mockRejectedValue não propaga exceção
      (flushAsync resolves) e que o lead permanece criado. triggerAutomations
      continua fire-and-forget e independente. A roleta roda dentro do contexto
      after() já estabelecido — sem nova superfície de falha síncrona no request.

  - check: "5. Test Architecture"
    status: PASS
    note: >
      4 testes co-localizados cobrindo os 4 cenários obrigatórios (AC1-AC4). A
      estratégia é correta e determinística: mocka @web/lib/roleta/distributor e
      @web/lib/email-automations, monta um mock in-memory do Supabase chainable, e
      força after() a rodar eager via vi.mock("next/server") — observando os efeitos
      fire-and-forget. Crucialmente, ESTE teste mocka @web/lib/supabase/admin ANTES
      do import dinâmico, evitando o problema de alias @web/* que afeta o teste real
      do webhook whatsapp. AC1 verifica chamada única com (leadId, orgId); AC2
      verifica não-chamada + broker preservado; AC3 cobre fora_horario; AC4 cobre
      falha capturada. Cobertura adequada para um diff de 2 linhas efetivas.

  - check: "6. NFR (Performance)"
    status: PASS
    note: >
      Mudança puramente aditiva, zero query extra no caminho síncrono do webhook
      (a roleta roda em after(), fire-and-forget). Nenhum N+1 introduzido: a roleta
      é chamada uma vez por lead novo. O caminho de lead existente (mais frequente
      em re-entradas) não ganhou nenhuma chamada. Sem impacto no tempo de resposta
      do 200 (retornado antes do processamento async).

  - check: "7. Regression Risk"
    status: PASS
    note: >
      Diff mínimo e isolado (8 linhas em meta-ads/route.ts). O fluxo existente do
      webhook Meta (verificação de assinatura, webhook_logs, fetchLeadData,
      triggerAutomations, activities) permanece intacto. type-check web 0 erros;
      4/4 testes da story verdes. As 6 falhas pré-existentes de
      webhook/whatsapp/__tests__/route.test.ts (alias @web/* não resolve no vitest,
      Story 21.1) permanecem IDÊNTICAS — confirmado: nenhum arquivo dessa rota nem
      do vitest.config.ts está no diff. Sem migration, rollback trivial. distributor.ts
      não tocado, portanto nenhum risco aos outros consumidores (webhook WhatsApp,
      endpoint manual /api/roleta/distribute).

