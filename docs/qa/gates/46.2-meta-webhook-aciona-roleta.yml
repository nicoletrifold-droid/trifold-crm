risk_assessment:
  probability: low
  impact: low
  rationale: >
    Mudança aditiva de 2 linhas efetivas, isolada no caminho de lead novo do webhook
    Meta. A chamada é best-effort (não derruba o webhook) e estruturalmente impedida
    de atingir leads já atribuídos (invariante ADR-001 por construção). distributor.ts
    intocado (sem risco a outros consumidores). Pior caso runtime: a roleta falha →
    console.error e o lead permanece criado (fica represado, coberto pela 46-3). Sem
    migration, sem nova env var, rollback trivial. Corrige um bug P0 de produção.

gate_decision:
  verdict: PASS
  rationale: >
    Os 7 quality checks passam. 6/6 ACs atendidos por código com evidência path:linha;
    4/4 testes verdes cobrindo os cenários obrigatórios. O invariante P0 ADR-001 foi
    verificado diretamente: a chamada distributeLeadToNextBroker está exclusivamente
    no caminho de lead novo (meta-ads/route.ts:241-243), nunca no de update
    (202-210), prevenindo o roubo de lead que o UPDATE incondicional do RPC
    (migration 071:94) causaria. REUSE exemplar do distributor.ts e do padrão WhatsApp.
    type-check (web) e ESLint exit 0. As issues remanescentes (2 LOW) são
    não-bloqueantes. Aprovada para @devops push.
  next_steps:
    - "@devops *push da branch atual"
    - "Smoke pós-deploy: POST /api/webhooks/meta-ads com field_data inline (sandbox) → confirmar leads.assigned_broker_id preenchido + lead_distribution_log status='distributed'. Simular fora-de-horário → status='fora_horario', assigned_broker_id NULL, webhook 200."
    - "@po manter backlog TEST-001 (vitest resolve.alias @web/*) compartilhado com 50-x/51-x."

