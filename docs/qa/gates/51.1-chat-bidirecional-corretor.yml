quality_checks:
  - check: "1. Requirements Traceability"
    status: PASS
    note: >
      AC1-AC10 mapeados para código e teste/evidência. AC1/AC9 (UI gated por
      role), AC2 (route com auth + ownership + insert role='broker'), AC3
      (janela 24h → 409 sem enviar/gravar), AC4 (Telegram sem janela), AC5
      (router.refresh + onSent), AC6 (apenas grava role='broker'; is_ai_active
      intocado), AC7 (dispatch nunca lança; grava com metadata.send_error),
      AC8 (validação string/não-vazio/<=4096 → 400), AC10 (lint/types/testes).
      Ver tabela ac_traceability.

  - check: "2. Code Quality & Standards"
    status: PASS
    note: >
      Imports absolutos (@web/*) em todos os arquivos. Helper puro
      dispatch-broker-message.ts sem dependências runtime — testável sem o
      alias @web/* que não resolve no vitest (padrão correto herdado de
      buildCtwaMetadata, Story 50-3). Reuso fiel: WhatsApp Graph API v21.0 +
      Bearer (espelha notify-broker.ts:97-100 e
      appointment-whatsapp-reminders); Telegram tg: chatId
      (espelha cron/followup/route.ts:23-34). JSDoc abrangente, naming
      consistente, sem código morto. AbortSignal.timeout em ambos canais.

  - check: "3. Security"
    status: PASS
    note: >
      Auth via requireAuth(); ownership por assigned_broker_id === appUser.id
      (correto — migration 085 confirma que assigned_broker_id armazena
      brokers.user_id, e broker page filtra .eq("assigned_broker_id",
      user.id)). Admin/supervisor/gerente-comercial liberados. Lead lido via
      createClient() (RLS) com filtro org_id explícito → defesa em
      profundidade. createAdminClient() usado APENAS para ler whatsapp_config
      (token sensível por org) — token nunca retornado ao cliente, apenas
      injetado no helper server-side. Validação de input completa (AC8). Insert
      passa pela policy messages_insert (004) que exige apenas org_id match na
      conversation → corretor consegue inserir sem admin client (R1 resolvido).

  - check: "4. Reliability / Error Handling"
    status: PASS
    note: >
      dispatchBrokerMessage nunca lança (try/catch + errorCode normalizando
      TimeoutError/AbortError → 'TIMEOUT'). AC7 honrado: falha externa grava a
      mensagem com metadata.send_error e retorna success:true + sent:false.
      AC3 honrado: WHATSAPP_WINDOW_CLOSED retorna 409 ANTES de qualquer fetch
      ou insert. Janela lida do conversation.last_message_at ANTES do insert (o
      trigger trg_messages_update_conv bumpa só AFTER INSERT). R3 coberto:
      conversation criada se não existir. Casos WHATSAPP_CONFIG_MISSING e
      TELEGRAM_TOKEN_MISSING degradam graciosamente (gravam com send_error).

  - check: "5. Test Architecture"
    status: PASS
    note: >
      11/11 testes verdes (npx vitest run dispatch-broker-message.test.ts).
      Cobre os 4 cenários obrigatórios (T5) + resolveChannel,
      isWithinWhatsAppWindow (3 casos incl. null), WHATSAPP_CONFIG_MISSING e
      TELEGRAM_TOKEN_MISSING. Asserções fortes (URL contém graph.facebook.com
      vs api.telegram.org; fetch NÃO chamado fora da janela). Gap não-bloqueante:
      a lógica do route (ownership, criação de conversation, merge de metadata,
      branch de gravação em falha) não tem teste de integração — ver TEST-001.

  - check: "6. NFR (Performance / Maintainability)"
    status: PASS
    note: >
      Separação de responsabilidades limpa: helper puro (dispatch) × route
      (auth/IO/persistência) × UI (client component). Queries enxutas com
      .single()/.maybeSingle() e selects específicos; sem N+1. Round-trips
      sequenciais (lead → conversation → waConfig → insert) aceitáveis para
      ação interativa de baixa frequência. last_message_at delegado ao trigger
      (sem update redundante no route).

  - check: "7. Regression Risk"
    status: PASS
    note: >
      Mudanças aditivas: 4 arquivos novos + 2 telas que apenas renderizam o
      input gated por role (read-only path intacto). is_ai_active NUNCA escrito
      no caminho de envio (verificado por grep) → fluxo da Nicole preservado;
      takeover continua vindo de brokerSentRecently (followup/route.ts:177).
      Suite completa: 292 passed / 6 failed. As 6 falhas são EXCLUSIVAS de
      webhook/whatsapp/__tests__/route.test.ts (Story 21.1) com root cause
      "Cannot find package '@web/lib/supabase/admin'" — pré-existentes em main
      (confirmado no gate 50.3 TEST-001), NÃO introduzidas por esta story.

