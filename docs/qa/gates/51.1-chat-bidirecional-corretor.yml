risk_assessment:
  probability: low
  impact: low
  rationale: >
    Mudança aditiva e bem isolada (4 novos + 2 telas só com render condicional).
    Helper puro não toca IO; route nunca derruba a request; is_ai_active
    intocado. Rollback trivial via git revert. Pior caso runtime: envio externo
    falha → mensagem gravada com send_error (estado recuperável e visível ao
    corretor). Sem migration. Sem nova superfície de RLS (reusa policy 004).

gate_decision:
  verdict: PASS
  rationale: >
    Os 7 quality checks passam. 10/10 ACs atendidos por código com evidência
    path:linha; 11/11 testes verdes nos caminhos críticos de dispatch; lint e
    type-check limpos nos arquivos da story (resíduos são ambientais/pré-existentes).
    Regra de negócio crítica (Nicole continua atendendo; sem desligar is_ai_active;
    takeover via brokerSentRecently) verificada diretamente no código. As 3 issues
    LOW e 1 MEDIUM são não-bloqueantes (cobertura de route via infra de teste +
    refinamentos de janela/handoff a tratar junto de 51-2/51-5). Aprovada para
    @devops push.
  next_steps:
    - "@devops *push da branch atual"
    - "Smoke pós-deploy: corretor envia mensagem em /broker/leads/{id}; verificar bolha 'Corretor' e SELECT messages WHERE role='broker'; confirmar Nicole pausada nas próximas 24h (brokerSentRecently)"
    - "@po criar backlog (TEST-001): vitest resolve.alias @web/* → packages/web/src/* (destrava testes de route + corrige 6 falhas pré-existentes do webhook 21.1)"
    - "Ao implementar 51-2 (handoff): revisar filtro status='active' em send-message/route.ts:96 (REL-002) e medição de janela 24h por última inbound (REL-001)"

