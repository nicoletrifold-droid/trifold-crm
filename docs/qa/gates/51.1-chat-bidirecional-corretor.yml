issues:
  - id: REL-001
    severity: low
    category: reliability
    finding: >
      A janela de 24h do WhatsApp é medida a partir de
      conversations.last_message_at, que o trigger trg_messages_update_conv
      (038) bumpa para QUALQUER mensagem inserida — incluindo as outbound
      (assistant/broker/system). A janela freeform do WhatsApp Business,
      porém, só reabre com mensagem INBOUND do lead. Em teoria, uma sequência
      de mensagens outbound pode manter last_message_at "fresco" e fazer a
      checagem AC3 passar mesmo quando a janela real já fechou (a API
      retornaria 131047). Na prática o impacto é mitigado: AC7 garante que o
      131047 vira metadata.send_error sem quebrar a request, e o pattern de
      janela já é o mesmo usado em todo o projeto.
    suggested_action: >
      Não-bloqueante. Para precisão futura, considerar medir a janela a partir
      da última mensagem com role='user' (inbound) em vez de
      conversations.last_message_at. Avaliar junto à Story 51-5 (template fora
      da janela), que já mexe nesse domínio.
  - id: TEST-001
    severity: medium
    category: testing
    finding: >
      A lógica do route send-message (ownership por role, criação de
      conversation quando ausente, merge de metadata, branch de gravação em
      falha de envio, mapeamento 409/404/403) não tem cobertura de teste
      automatizada — apenas o helper puro é testado. Causa raiz é o mesmo alias
      @web/* não resolvido pelo vitest (TEST-001 do gate 50.3) que impede
      testar routes que importam @web/lib/supabase/admin.
    suggested_action: >
      Não-bloqueante para 51-1. Resolver via story de QA infra (adicionar
      resolve.alias @web/* → packages/web/src/* no vitest.config.ts OU migrar
      para vitest workspaces). Isso destrava testes de route desta story E as
      6 falhas pré-existentes do webhook 21.1. @po criar via *backlog-add.
  - id: REL-002
    severity: low
    category: reliability
    finding: >
      A query de conversation filtra status='active' (route.ts:96). Se a
      conversation do lead estiver em status 'handed_off' (cenário plausível
      após handoff Nicole→corretor da Story 51-2), o route NÃO a encontra e
      cria uma NOVA conversation 'active', podendo fragmentar o histórico em
      duas conversations distintas para o mesmo lead.
    suggested_action: >
      Não-bloqueante hoje (51-2 ainda não em produção). Quando 51-2 entrar,
      revisar o filtro para incluir 'handed_off' ou buscar a conversation mais
      recente independente do status. Documentar como dependência de 51-2.
  - id: OBS-001
    severity: low
    category: tooling
    finding: >
      CodeRabbit CLI não executado (config WSL/Windows; host de review é
      macOS). Mesmo cenário das stories 50-1/50-2/50-3.
    suggested_action: >
      Não-bloqueante. Análise manual cobriu code review, security, reliability,
      regression e testing. CI pode rodar CodeRabbit pós-push em ambiente WSL.

positive_findings:
  - id: POS-001
    description: >
      Regra de negócio crítica do epic respeitada com rigor: is_ai_active
      jamais é escrito no caminho de envio (verificado por grep). O takeover de
      24h é 100% delegado ao mecanismo existente brokerSentRecently, exatamente
      como a story prescreve — zero lógica nova, zero risco de divergência.
  - id: POS-002
    description: >
      Helper puro injetando fetchImpl e now permite testes determinísticos sem
      mocks de Supabase nem timers globais. Decisão de design que isola a
      complexidade testável do IO — espelha o padrão validado em 50-3.
  - id: POS-003
    description: >
      Defesa em profundidade no route: além da RLS, há filtro org_id explícito
      no SELECT do lead E checagem de ownership explícita por role, cobrindo o
      caso de RLS permissiva para admin sem vazar leads entre orgs.
  - id: POS-004
    description: >
      AC7 implementado corretamente com a sutileza certa: WHATSAPP_WINDOW_CLOSED
      é a ÚNICA falha que NÃO grava (409), porque AC3 manda não tentar enviar;
      todas as demais falhas externas gravam com send_error. Distinção precisa
      entre "não enviável" e "envio falhou".

