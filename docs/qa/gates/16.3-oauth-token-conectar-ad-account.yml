    verifiedBy: "@qa (Quinn)"

issues:
  - id: H-001
    severity: high
    category: bug
    file: "packages/web/src/app/dashboard/configuracoes/integracoes/meta-ads/page.tsx"
    line: 19
    description: |
      `.eq('id', user.id)` usa o campo errado para lookup do app user.
      `supabase.auth.getUser()` retorna o Supabase auth UID, mas `users.id` é
      um UUID interno gerado por `gen_random_uuid()`. O campo correto é `users.auth_id`.
      Resultado: todos os usuários autenticados são redirecionados para `/login` ao
      acessar a página — feature completamente não funcional.
    fix_required: true
    recommendation: |
      Opção A (minimal): Trocar `.eq('id', user.id)` por `.eq('auth_id', user.id)`
      Opção B (preferred): Usar `getServerUser()` de `@web/lib/auth` que já encapsula
      esse padrão corretamente — mesmo usado em `integracoes/page.tsx` e outras páginas.

  - id: M-001
    severity: medium
    category: contract
    file: "packages/web/src/app/api/meta-ads/account/route.ts"
    description: |
      Campo no body do POST é `token` mas story AC3 define `system_user_token`.
      Sem impacto funcional (client e server usam o mesmo campo), mas diverge
      do contrato documentado no AC. Cria inconsistência para integrações futuras.
    fix_required: false
    recommendation: |
      Opcional: renomear para `system_user_token` para consistência com a story.
      Apenas se não houver cost de refactoring nos crons futuros.

  - id: L-001
    severity: low
    category: ux
    file: "packages/web/src/app/dashboard/configuracoes/integracoes/meta-ads/meta-ads-integration-card.tsx"
    line: 156
    description: |
      Botão "Salvar token" fica habilitado quando token está vazio mas adAccountId
      tem valor. O servidor retorna 400 "token_required" nesse caso, mas a UX
      sugere ao usuário que é possível atualizar apenas o ad_account_id sem repassar
      o token.
    fix_required: false
    recommendation: |
      Exibir mensagem de ajuda explicando que para atualizar apenas a conta
      o token também precisa ser preenchido, ou desabilitar o botão quando apenas
      adAccountId está preenchido.

