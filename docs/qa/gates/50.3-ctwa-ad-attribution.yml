gate_decision:
  verdict: CONCERNS
  rationale: >
    Aprovada para push. Verdict CONCERNS alinhado com convenção do projeto
    (gates 16.11, 50.1, 50.2) para "aprovado com observações documentadas".
    Todas as 5 issues são LOW/MEDIUM severity e não-bloqueantes. Implementação
    é cirúrgica, supera o padrão referencial em robustez (merge vs replace),
    e tem 8/8 testes verdes cobrindo todos os ACs testáveis. AC9 (validação
    pós-deploy) deferido por design — não bloqueia push. PERF-001 é tradeoff
    deliberado documentado pela story. MNT-001 e TEST-001 são tech debt
    pre-existentes que esta story não introduz nem agrava.
  next_steps:
    - "@devops *push da branch atual"
    - "Aplicar migration 075 ANTES ou JUNTO com deploy do código (ordem segura: migration primeiro porque é idempotente; código tem try/catch)"
    - "Pós-deploy: @devops executa queries de T6/AC9 documentadas nos Completion Notes da story (24h após push)"
    - "Considerar quick-fix DOC-001 (atualizar comentário stale em 016_meta_campaign_roas_view.sql:34) como follow-up"
    - "@po cria backlog para TEST-001 (vitest alias config) e MNT-001 (harmonização UTM-preservation)"

