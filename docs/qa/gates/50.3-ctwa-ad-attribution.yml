storyId: "50.3"
title: "Attribution ad_id para Leads Click-to-WhatsApp (CTWA)"
epic: 50
verdict: CONCERNS
reviewedAt: "2026-06-08"
reviewer: "Quinn (@qa)"
iteration: 1

summary: >
  Implementação cirúrgica e bem testada (+106 LoC no route + 79 LoC do helper
  + 184 LoC de testes + migration idempotente). Pure function `buildCtwaMetadata`
  extraída para testabilidade — decisão justificada e neutra em comportamento.
  8/8 testes verdes cobrindo os 3 cenários obrigatórios de AC5 + 5 cenários
  extras (string vazia, payload mínimo, janela 72h exata, idempotência, branch
  undefined). Type-check + lint clean (verificado independentemente em ambiente
  macOS sem stash). Pre-Flight aplicou Opção 2 (migration idempotente) —
  funciona em ambos cenários A/B. AC0-AC8 atendidos por código; AC9 deferido
  por design para validação pós-deploy. Aprovada para @devops push com 5
  observações documentadas (todas LOW/MEDIUM, não-bloqueantes).

quality_checks:
  - check: "1. Code Review"
    status: PASS
    note: >
      Padrão de merge não-destrutivo segue o referencial citado na story
      (/api/webhooks/meta-ads/route.ts:201-209) com ADAPTAÇÃO superior: o Meta
      webhook faz REPLACE de metadata (linha 206: metadata: metaMetadata),
      enquanto a 50-3 faz MERGE real via spread (...current). Isso significa
      que se um lead já tem metadata populado pelo webhook Meta (ex: form_id,
      campaign_id) e depois clica em CTWA, todos os campos prévios são
      preservados — comportamento mais robusto que o referencial. Helper
      `buildCtwaMetadata` extraído justificadamente (testabilidade pura sem
      stub de Supabase admin client). JSDoc comprehensive em todos os
      arquivos novos. Naming consistente com o padrão do projeto. Comentários
      inline referenciam Story 50-3 e padrão de re-engajamento. Hot-fix
      comment da 21.1 removido conforme AC6 e substituído por comentário de
      ponte para a 50-3.

  - check: "2. Unit Tests"
    status: PASS
    note: >
      `pnpm test packages/web/src/app/api/webhook/whatsapp/ctwa-metadata.test.ts`
      executado independentemente → **8/8 passed** (151ms). Cobre os 3 cenários
      obrigatórios de AC5:
        - AC5.1: Lead novo com referral → metadata populado com shape AC2 ✅
        - AC5.2: Lead existente sem metadata.ad_id → atualizado ✅
        - AC5.3: Lead existente com metadata.ad_id → NÃO sobrescrito ✅
      Plus 5 cenários extras incluindo idempotência (R4 da story), janela CTWA
      exata, branch undefined e ad_id como string vazia. Fixture anonimizada
      em __fixtures__/ctwa-referral.json reflete shape real da Meta Cloud API.

  - check: "3. Acceptance Criteria"
    status: PASS
    note: >
      AC0-AC8 todos atendidos (8/9 código + AC9 deferido por design):
        - AC0 (Pre-Flight): Documentado em Completion Notes; Opção 2 aplicada
          via migration 075 idempotente.
        - AC1 (persistência): linhas 333-340 do route.ts.
        - AC2 (shape): exato conforme spec, verificado em test AC5.1.
        - AC3 (preservação): buildCtwaMetadata.ts:55-60 + test AC5.3.
        - AC4 (utm/source novo): linhas 345-348 preservam comportamento atual
          para leads novos (UTMs em re-engajamento — ver OBS-002).
        - AC5 (testes): 8/8 passing.
        - AC6 (hot-fix removido): linhas 288-290 (comentário novo Story 50-3).
        - AC7 (tipo TS): packages/shared/src/whatsapp/types.ts criado + barrel
          export em index.ts.
        - AC8 (compila + lint): type-check verde, lint nos arquivos da story
          também verde.
        - AC9 (pós-deploy): DEFERIDO — query SQL documentada para @devops.

  - check: "4. No Regressions"
    status: PASS
    note: >
      - `pnpm test` (full): 274 passing + 6 pre-existentes failing em
        packages/web/src/app/api/webhook/whatsapp/__tests__/route.test.ts.
      - Confirmado via `git stash` + re-run: as 6 falhas ocorrem em `main`
        SEM as mudanças da 50-3, devido a alias `@web/lib/supabase/admin` não
        resolvido pelo vitest (incompatibilidade vitest config × Next.js tsconfig
        paths). Tech debt da Story 21.1 — fora do escopo desta story.
      - Comportamento UTM (utm_source, utm_medium, utm_campaign) **preservado
        bit-a-bit** para CTWA — verificado contra `git show HEAD:route.ts`
        (linhas 341-343 idênticas). Re-engajamento de leads CTWA já sobrescrevia
        UTMs em `main` — não é regressão da 50-3 (ver OBS-002).
      - Lookup chain `meta_ads → meta_adsets → meta_campaigns` mantido intacto
        (linhas 292-317) — mesma lógica que existia antes do refactor.
      - Webhook `idempotency check` (linhas 158-206) e `findOrUpsertLead` (linhas
        668-774) inalterados funcionalmente. Único change em findOrUpsertLead:
        comentário stale atualizado para refletir migration 075 (doc-only).
      - Try/catch envolvente do branch CTWA (linhas 287, 352-364) preservado —
        falha na atribuição CTWA continua não-fatal e gera `ctwa_referral_error`
        log sem quebrar o webhook.

  - check: "5. Performance"
    status: PASS
    note: >
      - Select extra de `leads.metadata` antes do update (linhas 327-331) adiciona
        1 round-trip Supabase ao path CTWA. Story declara explicitamente como
        "aceitável pois CTWA é fluxo de baixa frequência" (Dev Notes). Confirmo
        avaliação: estimativa típica é <1% dos webhooks WhatsApp são CTWA (a
        maioria é texto direto), então impacto agregado é negligível. Otimização
        para `UPDATE ... SET metadata = metadata || jsonb_build_object(...)` em
        SQL puro é viável e seria 1 round-trip ao invés de 2, mas adicionaria
        complexidade no helper (perderia testabilidade pura). Ver OBS-005.
      - Índice parcial `idx_leads_metadata_ad_id ON leads ((metadata->>'ad_id'))
        WHERE metadata->>'ad_id' IS NOT NULL` é apropriado para o lookup do
        CreativeChip (Story 50-2 fetchCreativesForLeads). Filtro WHERE economiza
        espaço (só indexa leads com ad_id resolvido — provavelmente <30% do
        total). Não há risco de performance degradation com este índice.
      - Helper `buildCtwaMetadata` é puro e O(1) — overhead negligível.

  - check: "6. Security"
    status: PASS
    note: >
      - NFR-4 (não logar payload externo): código compõe `referralData` mas
        nunca chama logEvent com o `source_url` ou `referral` cru. Log de erro
        em linhas 352-364 só persiste `error.message` e `lead.id` —
        compliance.
      - JSONB injection: `referral` é typed como `WhatsAppReferral` (strings
        opcionais). buildCtwaMetadata só faz nullish coalescing (`?? null`),
        sem `eval` ou interpolação SQL. Supabase typed client serializa JSONB
        seguramente via parametrized statements. Sem vetor de injection.
      - Idempotência (R4 da story): merge não-destrutivo + `preservedAdId`
        garante que retries do Meta com mesmo payload não destroem
        atribuição prévia. Test "AC5.3 / AC3" valida isso explicitamente.
        Test "idempotência" valida cenário de retry com mesmo ad_id.
      - HMAC validation (linhas 49-64 do route.ts) preservado — todo payload
        CTWA passa por verificação criptográfica antes de chegar no branch
        novo. Sem nova superfície de ataque.

  - check: "7. Documentation"
    status: PASS
    note: >
      Story file atualizada de forma exemplar:
        - File List completa (Modified + Created + Reference only).
        - Completion Notes detalham Pre-Flight + decisão Opção 2 + desvios da
          story (caminho de teste, extração de pure function) com justificativa
          técnica sólida (vitest config, testabilidade isolada).
        - Change Log com entrada 2026-06-08 v0.3 do @dev.
        - Status `Ready for Review`.
        - Blockers/notas para @qa e @devops bem articuladas, incluindo tech
          debt latente (016_meta_campaign_roas_view.sql:34 comment agora stale).
      migration 075 tem header documentando o contexto histórico, ambos cenários
      A/B, shape esperado do JSONB e referência à Epic 50. JSDoc no helper
      explica regras de merge linha a linha. Tipo `WhatsAppReferral` documenta
      cada campo com semântica de origem (Cloud API vs Business Account).

