issues:
  - id: PERF-001
    severity: low
    category: performance
    description: >
      O branch CTWA executa um round-trip extra Supabase (SELECT metadata) antes
      do UPDATE para preservar ad_id histórico. Em fluxos de alta frequência
      isso poderia importar, mas CTWA é minoritário no volume total de webhooks
      WhatsApp.
    recommendation: >
      Não-bloqueante. Para otimização futura, considerar refactor para SQL puro
      via `UPDATE leads SET metadata = jsonb_set(...) || jsonb_build_object('ad_id',
      COALESCE(metadata->>'ad_id', $1::text), ...) WHERE id = $2`. Custo: perde
      testabilidade pura do helper. Como migração 075 já cria o índice parcial,
      essa otimização não é urgente.

  - id: MNT-001
    severity: low
    category: maintainability
    description: >
      AC4 só constrai comportamento em "lead novo via CTWA" — para re-engajamento
      (lead existente clicando em novo CTWA), os campos `source`, `utm_source`,
      `utm_medium`, `utm_campaign` são UNCONDITIONALLY sobrescritos na linha
      342-351. Isso DIFERE do padrão referencial do webhook Meta (meta-ads/route.ts:207
      `...(existingUtmCampaign === null ? utmData : {})`), que preserva UTMs prévios.
      Comportamento pre-existente em `main` (não é regressão da 50-3) mas é
      inconsistência arquitetural notável.
    recommendation: >
      Não-bloqueante para esta story (AC4 não exige preservação em re-engajamento;
      comportamento pre-existente). Documentar como tech debt para revisão futura:
      considerar alinhar com o padrão Meta (preservar utm_campaign se já populado)
      ou explicitar a divergência via comentário inline. Recomendar @po criar
      backlog story tipo `tech_debt` para harmonização de UTM-preservation
      entre webhooks WhatsApp e Meta.

  - id: TEST-001
    severity: medium
    category: testing
    description: >
      6 testes de packages/web/src/app/api/webhook/whatsapp/__tests__/route.test.ts
      (Story 21.1) **continuam falhando** com erro `Cannot find package '@web/lib/supabase/admin'`.
      Confirmado pré-existente em `main` via `git stash` + re-run — não é
      regressão da 50-3. Causa raiz: vitest config (`vitest.config.ts` root) não
      resolve o alias `@web/*` definido em `packages/web/tsconfig.json` paths.
    recommendation: >
      Não-bloqueante para 50-3 (não introduz a falha; story 50-3 declara isso em
      Completion Notes). Mas é tech debt **médio** que afeta a confiança no
      regression net da Story 21.1 (webhook idempotency core flow está sem
      verificação automática local). Criar story de QA infra:
        - Adicionar `resolve.alias` no vitest.config.ts mapeando `@web/*` →
          `packages/web/src/*`.
        - OU migrar route.test.ts para vitest workspaces com config local da
          @trifold/web.
      Prioridade: medium (cobertura crítica, mas mitigação atual é manual integration
      testing via webhook real). Sugerir @po criar via *backlog-add.

  - id: DOC-001
    severity: low
    category: documentation
    description: >
      Comentário em `supabase/migrations/016_meta_campaign_roas_view.sql:34`
      ainda declara `leads.metadata NÃO existe — branch removido vs. proposta
      original do epic`. Após migration 075, este comentário é incorreto e
      potencialmente confunde futuros leitores que façam arqueologia.
    recommendation: >
      Não-bloqueante. Documentado em Completion Notes da 50-3 como "fora de
      escopo, mas notável". Considerar uma micro-PR follow-up que atualize o
      comentário para algo como "Coluna leads.metadata adicionada em migration
      075 (Story 50-3, Epic 50). Comentário histórico mantido para contexto."

  - id: OBS-001
    severity: low
    category: tooling
    description: >
      CodeRabbit CLI não executado nesta review — config aponta para WSL/Windows
      e host de revisão é macOS. Mesmo cenário das stories 50-1 e 50-2.
    recommendation: >
      Não-bloqueante. Análise manual cobriu code review, security, performance,
      regression e testing. Recomendar @devops/CI executar CodeRabbit em ambiente
      WSL como passo opcional pós-push.

positive_findings:
  - id: POS-001
    description: >
      Implementação SUPERA o padrão referencial citado: enquanto o webhook Meta
      (meta-ads/route.ts:206) faz REPLACE de metadata (`metadata: metaMetadata`),
      a 50-3 faz MERGE real via `{...current, ...new}`. Isso significa que se
      um lead já tem `campaign_id`, `form_id` ou `leadgen_id` populados pelo
      Meta Lead Form webhook e depois clica em CTWA, esses campos são
      PRESERVADOS — comportamento mais robusto que o referencial.

  - id: POS-002
    description: >
      Extração da pure function `buildCtwaMetadata` é uma decisão exemplar de
      testabilidade. Sem a extração, AC5 só seria atingível com stub completo
      de `NextRequest` + Supabase admin (que falha hoje no vitest por causa do
      alias `@web/*`). A função é totalmente testável em isolamento, sem
      mocks. JSDoc + tipos `CtwaMetadataInput`/`CtwaMetadataResult` deixam o
      contract explícito.

  - id: POS-003
    description: >
      migration 075 é idempotente E documenta histórico. Header explica:
      (1) inconsistência entre código e migrations committed,
      (2) ambos cenários A/B (coluna ausente vs migration remote-only),
      (3) shape esperado do JSONB com TODOS os campos atuais e futuros.
      Padrão de migration documentation que outras stories podem espelhar.

  - id: POS-004
    description: >
      Tests cobrem 5 cenários ALÉM dos 3 obrigatórios de AC5: string vazia
      tratada como ausente (defensive), payload minimalista (Meta Business
      Account vs Cloud API), janela CTWA exata 72h (matemática), branch
      `currentMetadata=undefined` (default param), idempotência sob retry
      Meta (R4). Cobre os 4 riscos documentados da story (R1-R4) explicitamente.

  - id: POS-005
    description: >
      Helper `WhatsAppReferral` no @trifold/shared estabelece tipo compartilhado
      que pode ser reusado por outras integrações WhatsApp futuras (templates,
      campaigns, notifications). JSDoc documenta variação entre Meta Business
      Account e Cloud API (R2 da story), com guidance para parsing defensivo.

  - id: POS-006
    description: >
      Story 50-3 completa o ciclo Epic 50: Story 50-1 (sync de thumbnails) +
      Story 50-2 (CreativeChip UI) já em produção. Com 50-3, leads CTWA NOVOS
      passam a aparecer com chip de criativo no pipeline IMEDIATAMENTE após
      deploy, sem necessidade de backfill. Stories 50-1 e 50-2 (que assumiam
      `leads.metadata.ad_id` populado) ficam fully operacionais para o canal
      CTWA — anteriormente só funcionavam para Lead Form.

risk_assessment:
  probability: low
  impact: low
  rationale: >
    Mudança bem isolada: 1 arquivo route modificado + 4 arquivos novos (helper,
    test, fixture, migration, tipo). Try/catch envolvente garante que falha na
    atribuição CTWA NÃO quebra o webhook (preserva idempotência core da 21.1).
    migration 075 é idempotente — safe para ambos cenários A/B e safe para
    reapply. Rollback via `git revert` é trivial (5 arquivos). Pior caso
    runtime: branch CTWA falha → log `ctwa_referral_error` + lead criado sem
    ad_id (mesmo estado de antes da story). Sem regressão funcional possível.

