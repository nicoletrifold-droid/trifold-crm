issues:
  - severity: low
    category: code
    description: "PATCH /obras/[obra_id] não valida se `updates` está vazio antes de chamar .update({})"
    recommendation: "Opcional: retornar 400 se nenhum campo válido for enviado. Comportamento atual (update sem SET) é inócuo mas pode confundir."

  - severity: info
    category: code
    description: "Modo B em /clientes usa string matching 'duplicate' para detectar conflito UNIQUE"
    recommendation: >
      Funciona corretamente — erro PostgreSQL UNIQUE violation contém 'duplicate key value'.
      Alternativa mais robusta seria verificar error.code === '23505' no futuro.

  - severity: info
    category: code
    description: "page.tsx busca mensagens sem filtro org_id explícito (apenas obra_id)"
    recommendation: >
      Seguro: obra já foi verificada como pertencente à org antes do notFound().
      UUID globalmente único previne cross-org. RLS é segunda camada. Sem risco.
