  notes: >
    Todos os routes verificam org_id antes de qualquer operação de dados. ALLOWED_ROLES
    aplicado consistentemente. createAdminClient() chamado apenas após role check.
    Rollback implementado (deleteUser) caso INSERT em users falhe no Modo A.
