risk_assessment:
  probability: low
  impact: low
  rationale: >
    Mudança aditiva e isolada no cron de follow-up: 1 campo extra no SELECT, 1 import, 1 chamada
    best-effort + logEvent após o insert de alert_broker. A notificação nunca derruba o loop do cron
    (AC6, try/catch retornando boolean), nunca toca is_ai_active, e respeita estruturalmente o
    brokerSentRecently (AC7). notify-broker.ts/roleta/notifyImobiliaria intactos. Pior caso runtime:
    notificação falha → log de erro, o alert_broker já está persistido e os demais leads seguem
    processando. Sem migration, sem nova superfície de RLS/endpoint. Rollback trivial via git revert.

gate_decision:
  verdict: PASS
  rationale: >
    Os 7 quality checks passam. 8/8 ACs atendidos por código com evidência path:linha; 9/9 testes
    verdes nos caminhos testáveis (dispara/fallback/anti-spam/falha-não-propaga/config/edge). Os
    invariantes críticos do epic foram verificados diretamente no código: (a) AC7 — continue do
    brokerSentRecently antes do bloco alert_broker e helper chamado depois do insert; (b) is_ai_active
    intocado (só comentário); (c) role de fallback com hífen real. Best-effort sólido (boolean +
    try/catch). type-check web e ESLint exit 0. As issues remanescentes (1 MEDIUM de infra de teste
    herdada + 2 LOW) são não-bloqueantes. Aprovada para @devops push.
  next_steps:
    - "@devops *push da branch atual"
    - "Smoke pós-deploy: ajustar alert_days de uma regra de teste; rodar o cron; confirmar que o corretor atribuído (ou gerente/admin no fallback) recebe push/email/WhatsApp UMA vez; confirmar que rodadas subsequentes NÃO reenviam (anti-spam); confirmar que a Nicole continua ativa (is_ai_active=true) no lead."
    - "@po manter backlog TEST-001 (vitest resolve.alias @web/*) — destrava testes de route/handler E corrige as 6 falhas do webhook 21.1."
    - "Documentar a dependência REL-001 ao alterar o cooldownSet do cron no futuro."

