schema: 1
storyId: "51.4"
story: "51.4"
title: "Notificar Corretor quando Follow-ups Esgotam (Gatilho B)"
epic: 51
gate: PASS
verdict: PASS
status_reason: >
  Os 8 ACs estão atendidos por código com evidência path:linha e cobertos por 9
  testes verdes (dispara com broker / fallback gerente / fallback ausente sem throw /
  anti-spam / falha não propaga / config default+override / lead sem nome). A regra
  de negócio crítica do epic é preservada: a notificação NÃO toca is_ai_active (única
  ocorrência no arquivo é um comentário) e a estrutura do cron garante AC7 — o
  `if (brokerSentRecently) continue` (route.ts:182) está ANTES do bloco alert_broker
  (247) e a chamada notifyBrokerOfStalledLead (270) está DEPOIS do insert (249).
  Fallback usa o role REAL com hífen ("gerente-comercial"), não underscore. Best-effort:
  o helper é todo try/catch e retorna boolean, nunca lança, então o loop do cron segue
  processando os demais leads. type-check web e ESLint exit 0. As 6 falhas pré-existentes
  do webhook 21.1 (alias @web/* no vitest) permanecem inalteradas — não introduzidas aqui.
