issues:
  - id: CHART-LIMIT-001
    severity: medium
    category: performance
    description: >
      O query de leads em /api/analytics/leads-by-period não tem .limit(). Para ranges
      longos (90d) em CRMs com volume alto (ex: 10k+ leads), o Supabase pode retornar
      todas as linhas sem paginação, aumentando latência. Atualmente o CRM está em
      volume baixo — não é um problema presente, mas é technical debt para escala.
    recommendation: >
      Adicionar .limit(50000) como guardrail de segurança, ou migrar para SQL RPC
      aggregated (como planejado na story) que faz GROUP BY no banco e retorna apenas
      N rows de contagens, não todas as linhas brutas. Sugestão para story futura.
    blocking: false

  - id: CHART-PEAK-002
    severity: low
    category: behavior
    description: >
      Se generatePeriods() retornar array vazio (edge case: from > to, não alcançável
      via UI normal), summary.peakPeriod = "" e formatPeriodLabel("") renderiza
      "Invalid Date" no card de pico. Não alcançável na prática — presets sempre geram
      range válido, custom range requer ambas as datas preenchidas.
    recommendation: >
      Adicionar guard: peakPeriod ? formatPeriodLabel(peakPeriod, granularity) : "—"
      no componente. Defensive programming simples. Pode ser corrigido junto com
      CHART-LIMIT-001 em story futura.
    blocking: false

