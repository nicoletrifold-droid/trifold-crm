      { signal: AbortSignal.timeout(10_000) } adicionado em ambos os fetch():
      linha 269 (fetchLeadData) e linha 285 (resolveCampaignName).

  - id: REL-001
    status: RESOLVED
    resolution: |
      phone: phone ?? null no insert (linha 191). Leads sem telefone entram
      com phone=null — dedup query já tem `if (phone)` guard, sem colisão.

  - id: TEST-001
    status: TECH_DEBT
    resolution: |
      Registrado no Change Log da story. Será endereçado em Story 16.6
      junto com tabela webhook_logs e testes de integração do handler.

